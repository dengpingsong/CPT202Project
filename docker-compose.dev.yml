# Development override: separate containers, volumes, and ports from production
services:
  mysql:
    container_name: cpt202-mysql-dev
    ports:
      - "9001:3306"
    volumes:
      - cpt202-mysql-data-dev:/var/lib/mysql
  app:
    container_name: cpt202program-dev
    ports:
      - "8081:8080"
  nginx:
    container_name: cpt202-nginx-dev
    ports:
      - "8082:80"
      - "8443:443"

volumes:
  cpt202-mysql-data-dev:
    external: true
