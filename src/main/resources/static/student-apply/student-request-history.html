<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>请求历史 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏（已移除“热门导师”） -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <!-- 热门导师按钮已移除 -->
            <a href="#" class="active">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区域（参照教师端 history.html 结构） -->
    <main class="main">
        <header class="page-header">
            <h1>📋 请求历史</h1>
        </header>

        <div class="panel">
            <div class="timeline-vertical" id="historyTimeline">
                <!-- 时间轴条目将通过 JS 动态渲染 -->
            </div>
        </div>
    </main>
</div>

<script>
    (function() {
        "use strict";

        // ---------- 模拟请求历史数据 ----------
        const historyData = [
            {
                id: 'req-001',
                projectTitle: '智能教学系统研究',
                projectId: 'proj-ai-01',
                supervisor: '李老师',
                applyDate: '2025-04-10',
                lastUpdate: '2025-04-13',
                status: 'Pending',
                note: '希望参与可视化模块，有前端经验',
                feedback: ''
            },
            {
                id: 'req-002',
                projectTitle: '校园智慧导航系统',
                projectId: 'proj-gis-02',
                supervisor: '王老师',
                applyDate: '2025-03-28',
                lastUpdate: '2025-04-02',
                status: 'Rejected',
                note: '补充了移动开发学习经历',
                feedback: '名额已满，欢迎下次合作'
            },
            {
                id: 'req-003',
                projectTitle: '实验室管理大屏',
                projectId: 'proj-dash-03',
                supervisor: '赵老师',
                applyDate: '2025-03-12',
                lastUpdate: '2025-03-15',
                status: 'Withdrawn',
                note: '前端+交互设计，后因时间冲突撤回',
                feedback: ''
            },
            {
                id: 'req-004',
                projectTitle: '区块链证书验证',
                projectId: 'proj-bc-04',
                supervisor: '周教授',
                applyDate: '2025-02-20',
                lastUpdate: '2025-03-01',
                status: 'Accepted',
                note: '熟悉Solidity和智能合约',
                feedback: '欢迎加入课题组，请查看邮件'
            },
            {
                id: 'req-005',
                projectTitle: '水质监测IoT',
                projectId: 'proj-iot-05',
                supervisor: '郑老师',
                applyDate: '2025-04-01',
                lastUpdate: '2025-04-05',
                status: 'Pending',
                note: '有嵌入式开发经验，可参与硬件',
                feedback: ''
            },
            {
                id: 'req-006',
                projectTitle: 'NLP课程问答系统',
                projectId: 'proj-nlp-06',
                supervisor: '孙老师',
                applyDate: '2025-01-15',
                lastUpdate: '2025-01-20',
                status: 'Rejected',
                note: '对BERT微调感兴趣',
                feedback: '课题已结题，不再接收新成员'
            }
        ];

        const timelineEl = document.getElementById('historyTimeline');

        // 状态映射：颜色与教师端类似
        function getStatusStyle(status) {
            switch(status) {
                case 'Pending': return 'color: var(--orange);';
                case 'Accepted': return 'color: var(--green);';
                case 'Rejected': return 'color: #c74545;';
                case 'Withdrawn': return 'color: var(--muted);';
                default: return 'color: var(--deep);';
            }
        }

        function getStatusText(status) {
            const map = {
                'Pending': '待审批',
                'Accepted': '已同意',
                'Rejected': '已拒绝',
                'Withdrawn': '已撤回'
            };
            return map[status] || status;
        }

        // 构建时间轴 HTML（按申请日期倒序）
        function renderTimeline() {
            if (!timelineEl) return;

            // 按日期倒序排列（最新的在前）
            const sorted = [...historyData].sort((a, b) =>
                new Date(b.applyDate) - new Date(a.applyDate)
            );

            let html = '';
            sorted.forEach(item => {
                const statusColor = getStatusStyle(item.status);
                const statusText = getStatusText(item.status);
                // 标题：项目名称 + 状态
                const title = `${item.projectTitle} · ${statusText}`;
                // 描述：导师、申请时间、备注、反馈等
                let desc = `导师：${item.supervisor}  |  申请时间：${item.applyDate}  |  最后更新：${item.lastUpdate}`;
                if (item.note) desc += `<br>📝 备注：${item.note}`;
                if (item.feedback) desc += `<br>💬 反馈：${item.feedback}`;

                html += `
                    <div class="item">
                        <div class="timeline-date">${item.applyDate}</div>
                        <div class="timeline-title" style="${statusColor}">${title}</div>
                        <div class="timeline-desc">${desc}</div>
                    </div>
                `;
            });

            timelineEl.innerHTML = html || `<div class="item"><div class="timeline-desc">暂无请求历史</div></div>`;
        }

        renderTimeline();

        // ---------- 侧边栏折叠功能 ----------
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

    })();
</script>
</body>
</html>
