<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>请求历史 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏（已移除“热门导师”） -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <!-- 热门导师按钮已移除 -->
            <a href="#" class="active">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区域（参照教师端 history.html 结构） -->
    <main class="main">
        <header class="page-header">
            <h1>📋 请求历史</h1>
        </header>

        <div class="panel">
            <div class="timeline-vertical" id="historyTimeline">
                <div class="item">
                    <div class="timeline-title">正在加载请求历史</div>
                    <div class="timeline-desc">请稍候</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";

        const user = ApiClient.requireAuth("STUDENT");
        if (!user) return;

        const timelineEl = document.getElementById('historyTimeline');

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeStatus(status) {
            return String(status || "UNKNOWN").toUpperCase();
        }

        // 状态css
        function getStatusStyle(status) {
            switch(normalizeStatus(status)) {
                case 'PENDING': return 'color: var(--orange);';
                case 'ACCEPTED': return 'color: var(--green);';
                case 'REJECTED': return 'color: #c74545;';
                case 'WITHDRAWN': return 'color: var(--muted);';
                default: return 'color: var(--deep);';
            }
        }
        // 状态映射
        function getStatusText(status) {
            const map = {
                'PENDING': '待审批',
                'ACCEPTED': '已同意',
                'REJECTED': '已拒绝',
                'WITHDRAWN': '已撤回'
            };
            const normalized = normalizeStatus(status);
            return map[normalized] || normalized;
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 16);
            return date.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }
        // 获取请求的最后更新时间，优先级：审核时间 > 撤回时间 > 提交时间
        function requestLastUpdate(request) {
            return request.reviewedAt || request.withdrawnAt || request.submittedAt;
        }
        //就是伪造一条的简单逻辑
        function fallbackHistory(request) {
            const status = normalizeStatus(request.requestStatus);
            return [{
                requestId: request.requestId,
                newStatus: status,
                remark: request.decisionComment || request.notes || "",
                changedAt: requestLastUpdate(request)
            }];
        }

        function buildTimelineEntries(requests, historyGroups) {
            const entries = [];

            requests.forEach(request => {
                const histories = historyGroups[request.requestId] || fallbackHistory(request);
                histories.forEach(history => {
                    const status = history.newStatus || request.requestStatus;
                    entries.push({
                        requestId: request.requestId,
                        projectId: request.projectId,
                        projectTitle: request.projectTitle || "未命名项目",
                        status,
                        submittedAt: request.submittedAt,
                        preferenceRank: request.preferenceRank,
                        notes: request.notes,
                        decisionComment: request.decisionComment,
                        remark: history.remark,
                        changedByStudentName: history.changedByStudentName,
                        changedAt: history.changedAt || requestLastUpdate(request)
                    });
                });
            });

            return entries.sort((a, b) => new Date(b.changedAt || 0) - new Date(a.changedAt || 0));//排序
        }

        function renderTimeline(entries) {
            if (!timelineEl) return;

            if (entries.length === 0) {
                timelineEl.innerHTML = `
                    <div class="item">
                        <div class="timeline-title">暂无请求历史</div>
                        <div class="timeline-desc">提交项目申请后，状态变化会显示在这里。</div>
                    </div>
                `;
                return;
            }

            timelineEl.innerHTML = entries.map(item => {
                const statusColor = getStatusStyle(item.status);
                const statusText = getStatusText(item.status);
                const detailUrl = `student-project-search-list-detail.html?projectId=${encodeURIComponent(item.projectId)}&from=history`;
                const parts = [
                    `申请时间：${esc(formatDate(item.submittedAt))}`,
                    `志愿顺位：${esc(item.preferenceRank || "-")}`
                ];
                if (item.notes) parts.push(`申请备注：${esc(item.notes)}`);
                if (item.remark) parts.push(`状态备注：${esc(item.remark)}`);
                if (item.decisionComment) parts.push(`审核反馈：${esc(item.decisionComment)}`);
                if (item.changedByStudentName) parts.push(`操作人：${esc(item.changedByStudentName)}`);

                return `
                    <div class="item">
                        <div class="timeline-date">${esc(formatDate(item.changedAt))}</div>
                        <div class="timeline-title" style="${statusColor}">
                            ${esc(item.projectTitle)} · ${esc(statusText)}
                        </div>
                        <div class="timeline-desc">
                            ${parts.join("<br>")}
                            <br><a href="${detailUrl}" style="color: var(--deep); font-weight: 600; text-decoration: none;">查看项目详情</a>
                        </div>
                    </div>
                `;
            }).join("");
        }

        async function loadRequestHistories(requests) {
            const historyGroups = {};

            for (const request of requests) {
                try {
                    const histories = await ApiClient.get(`/api/student/request-history/${encodeURIComponent(request.requestId)}`);
                    if (Array.isArray(histories) && histories.length > 0) {
                        historyGroups[request.requestId] = histories;
                    }
                } catch (error) {
                    console.error(error);
                }
            }

            return historyGroups;
        }

        async function initRequestHistory() {
            try {
                const requests = await ApiClient.get("/api/student/requests");
                const safeRequests = Array.isArray(requests) ? requests : [];
                const historyGroups = await loadRequestHistories(safeRequests);
                renderTimeline(buildTimelineEntries(safeRequests, historyGroups));
            } catch (error) {
                console.error(error);
                timelineEl.innerHTML = `
                    <div class="item">
                        <div class="timeline-title" style="color: #c74545;">请求历史加载失败</div>
                        <div class="timeline-desc">${esc(error.message || "请稍后重试")}</div>
                    </div>
                `;
            }
        }

        initRequestHistory();

        //default sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

    })();
</script>
</body>
</html>
