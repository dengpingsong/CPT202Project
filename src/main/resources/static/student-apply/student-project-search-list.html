<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>Project list</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/studentsp.css?v=20260430" />
</head>
<body>
<div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="Toggle sidebar">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="#" class="active" style="pointer-events: none; cursor: default;">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息通知</span>
            </a>
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <a href="student-dashboard.html" class="back-link">← 返回工作台</a>
            <h1>开放项目列表</h1>
        </div>
        <div class="panel-card">
            <p style="color: var(--muted); margin-bottom: 10px;">点击 View 可在新页面查看项目详情</p>
            <div style="display:grid; grid-template-columns: minmax(180px, 1.5fr) minmax(150px, 1fr) minmax(150px, 1fr) auto; gap:10px; align-items:end; margin-bottom:14px;">
                <label style="display:flex; flex-direction:column; gap:6px; font-size:0.9rem; color:var(--muted);">
                    关键词
                    <input id="keywordFilter" type="search" placeholder="项目名称、方向或技能" style="padding:10px 12px; border:1px solid rgba(90,43,152,0.18); border-radius:12px; font:inherit;">
                </label>
                <label style="display:flex; flex-direction:column; gap:6px; font-size:0.9rem; color:var(--muted);">
                    分类
                    <select id="categoryFilter" style="padding:10px 12px; border:1px solid rgba(90,43,152,0.18); border-radius:12px; font:inherit; background:#fff;">
                        <option value="">全部分类</option>
                    </select>
                </label>
                <label style="display:flex; flex-direction:column; gap:6px; font-size:0.9rem; color:var(--muted);">
                    状态
                    <select id="statusFilter" style="padding:10px 12px; border:1px solid rgba(90,43,152,0.18); border-radius:12px; font:inherit; background:#fff;">
                        <option value="">全部状态</option>
                        <option value="AVAILABLE">正在招募</option>
                        <option value="REQUESTED">已有申请</option>
                        <option value="AGREED">已确认</option>
                        <option value="CLOSED">已关闭</option>
                        <option value="ARCHIVED">已归档</option>
                    </select>
                </label>
                <button class="pagination-btn" id="clearProjectFiltersBtn" type="button" style="padding:10px 14px; border-radius:12px;">清除筛选</button>
            </div>
            <div id="tagFilterBar" style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:16px;">
                <span style="color:var(--muted); font-size:0.9rem;">标签筛选：</span>
                <span style="color:var(--muted); font-size:0.9rem;">正在加载标签...</span>
            </div>
            <div class="table-wrapper">
                <table class="project-table" id="projectTable">
                    <thead>
                    <tr>
                        <th>Project Code</th>
                        <th>Project Title</th>
                        <th>Principal Investigator</th>
                        <th>Category</th>
                        <th>Topic area</th>
                        <th>Required</th>
                        <th>Status</th>
                        <th>Details</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div style="margin-top: 16px; font-size: 0.9rem;">
                共 <span id="projectCount">0</span> 个项目
            </div>
            <div class="pagination-bar" id="paginationBar" hidden>
                <button type="button" class="pagination-btn pagination-nav" id="prevPageBtn" aria-label="Previous page">
                    <i class="bi bi-chevron-left" aria-hidden="true"></i>
                    <span>上一页</span>
                </button>
                <div class="pagination-pages" id="paginationPages"></div>
                <button type="button" class="pagination-btn pagination-nav" id="nextPageBtn" aria-label="Next page">
                    <span>下一页</span>
                    <i class="bi bi-chevron-right" aria-hidden="true"></i>
                </button>
            </div>
            <div class="pagination-summary" id="paginationSummary"></div>
        </div>
        <div class="footnote">* 点击 View 跳转至详情页</div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function () {
        "use strict";

        const user = ApiClient.requireAuth("STUDENT");
        if (!user) return;

        const tbody = document.getElementById("tableBody");
        const projectCountSpan = document.getElementById("projectCount");
        const paginationBar = document.getElementById("paginationBar");
        const paginationPages = document.getElementById("paginationPages");
        const paginationSummary = document.getElementById("paginationSummary");
        const prevPageBtn = document.getElementById("prevPageBtn");
        const nextPageBtn = document.getElementById("nextPageBtn");
        const tagFilterBar = document.getElementById("tagFilterBar");
        const keywordFilter = document.getElementById("keywordFilter");
        const categoryFilter = document.getElementById("categoryFilter");
        const statusFilter = document.getElementById("statusFilter");
        const clearProjectFiltersBtn = document.getElementById("clearProjectFiltersBtn");
        const DEFAULT_PAGE_SIZE = 8;
        const state = {
            currentPage: 1,
            pageSize: null,
            totalPages: 1,
            total: 0,
            requests: [],
            tags: [],
            categories: [],
            selectedTagIds: new Set()
        };

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
        // 根据状态返回对应的标签css
        function statusPill(status) {
            const text = status || "UNKNOWN";
            let cls = "status-unavailable";
            if (status === "AVAILABLE") cls = "status-available";
            if (status === "PENDING" || status === "REQUESTED") cls = "status-requested";
            if (status === "ACCEPTED" || status === "AGREED") cls = "status-agreed";
            return `<span class="status-pill ${cls}">${esc(text)}</span>`;
        }

        function getResolvedPageSize(projectPage, listLength) {
            const backendPageSize = Number(projectPage?.pageSize);
            if (Number.isInteger(backendPageSize) && backendPageSize > 0) {
                return backendPageSize;
            }
            if (Number.isInteger(state.pageSize) && state.pageSize > 0) {
                return state.pageSize;
            }
            if (Number.isInteger(listLength) && listLength > 0) {
                return listLength;
            }
            return DEFAULT_PAGE_SIZE;
        }

        function getVisiblePages(currentPage, totalPages) {
            if (totalPages <= 5) {
                return Array.from({ length: totalPages }, (_, index) => index + 1);
            }
            if (currentPage <= 3) {
                return [1, 2, 3, 4, 5];
            }
            if (currentPage >= totalPages - 2) {
                return [totalPages - 4, totalPages - 3, totalPages - 2, totalPages - 1, totalPages];
            }
            return [currentPage - 2, currentPage - 1, currentPage, currentPage + 1, currentPage + 2];
        }

        function renderPagination() {
            const total = Math.max(0, Number(state.total || 0));
            const totalPages = Math.max(1, Number(state.totalPages || 1));
            const currentPage = Math.min(Math.max(1, Number(state.currentPage || 1)), totalPages);
            const pageSize = Math.max(1, Number(state.pageSize || DEFAULT_PAGE_SIZE));

            if (total === 0) {
                paginationBar.hidden = true;
                paginationPages.innerHTML = "";
                paginationSummary.textContent = "";
                return;
            }

            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(total, currentPage * pageSize);
            const visiblePages = getVisiblePages(currentPage, totalPages);

            paginationBar.hidden = false;
            prevPageBtn.disabled = currentPage <= 1;
            nextPageBtn.disabled = currentPage >= totalPages;
            paginationSummary.textContent = `第 ${currentPage} / ${totalPages} 页，共 ${total} 个项目`;
            paginationPages.innerHTML = visiblePages.map(page => `
                <button
                    type="button"
                    class="pagination-number${page === currentPage ? " active" : ""}"
                    data-page="${page}">
                    ${page}
                </button>
            `).join("");
        }

        function renderRows(list) {
            const activeRequestProjectIds = new Set(
                state.requests
                    .filter(item => ["PENDING", "ACCEPTED"].includes(String(item.requestStatus || "").toUpperCase()))
                    .map(item => String(item.projectId))
            );

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#888;">暂无可申请项目</td></tr>`;
                return;
            }

            let html = "";
            list.forEach(project => {
                const current = Number(project.currentAgreedCount || 0);
                const max = Number(project.maxStudents || 0);
                const displayStatus = activeRequestProjectIds.has(String(project.projectId))
                    ? "REQUESTED"
                    : project.projectStatus;

                html += `
                <tr>
                    <td><strong>${esc(project.projectId)}</strong></td>
                    <td>${esc(project.title)}</td>
                    <td>${esc(project.teacherName || "-")}</td>
                    <td>${esc(project.categoryName || "-")}</td>
                    <td>${esc(project.topicArea || "-")}</td>
                    <td>${current}/${max}</td>
                    <td>${statusPill(displayStatus)}</td>
                    <td>
                        <a class="view-btn"
                           href="student-project-search-list-detail.html?projectId=${encodeURIComponent(project.projectId)}&from=list">
                           View
                        </a>
                    </td>
                </tr>
            `;
            });
            tbody.innerHTML = html;
        }

        //加载tag
        function renderTagFilters() {
            if (!tagFilterBar) return;
            if (!state.tags.length) {
                tagFilterBar.innerHTML = `<span style="color:var(--muted); font-size:0.9rem;">暂无可筛选标签</span>`;
                return;
            }

            const clearDisabled = state.selectedTagIds.size === 0 ? "disabled" : "";
            tagFilterBar.innerHTML = `
                <span style="color:var(--muted); font-size:0.9rem;">标签筛选：</span>
                ${state.tags.map(tag => {
                    const tagId = String(tag.tagId);
                    const active = state.selectedTagIds.has(tagId);
                    return `
                        <button
                            type="button"
                            data-tag-id="${esc(tagId)}"
                            class="pagination-btn tag-filter-btn${active ? " active" : ""}"
                            style="padding:6px 12px; border-radius:999px; ${active ? "background:var(--deep); color:#fff;" : ""}">
                            ${esc(tag.tagName)}
                        </button>
                    `;
                }).join("")}
                <button type="button" class="pagination-btn" id="clearTagFiltersBtn" ${clearDisabled} style="padding:6px 12px; border-radius:999px;">清除</button>
            `;
        }

        async function loadTags() {
            if (!tagFilterBar) return;
            try {
                const tags = await ApiClient.get("/api/student/projects/tags");
                state.tags = Array.isArray(tags) ? tags : [];
                renderTagFilters();
            } catch (error) {
                console.error(error);
                tagFilterBar.innerHTML = `<span style="color:#c74545; font-size:0.9rem;">标签加载失败：${esc(error.message || "请稍后重试")}</span>`;
            }
        }

        function renderCategoryFilters() {
            if (!categoryFilter) return;
            categoryFilter.innerHTML = `<option value="">全部分类</option>` + state.categories.map(category => `
                <option value="${esc(category.categoryId)}">${esc(category.categoryName)}</option>
            `).join("");
        }

        async function loadCategories() {
            try {
                const categories = await ApiClient.get("/api/student/projects/categories");
                state.categories = Array.isArray(categories) ? categories : [];
                renderCategoryFilters();
            } catch (error) {
                console.error(error);
                categoryFilter.innerHTML = `<option value="">分类加载失败</option>`;
            }
        }

        async function loadProjects(targetPage) {
            try {
                const pageNum = Math.max(1, Number(targetPage || state.currentPage || 1));
                const params = new URLSearchParams({ pageNum: String(pageNum) });
                if (Number.isInteger(state.pageSize) && state.pageSize > 0) {
                    params.set("pageSize", String(state.pageSize));
                }
                state.selectedTagIds.forEach(tagId => {
                    params.append("tagIds", tagId);
                });
                const keyword = keywordFilter.value.trim();
                if (keyword) {
                    params.set("keyword", keyword);
                }
                if (categoryFilter.value) {
                    params.set("categoryId", categoryFilter.value);
                }
                if (statusFilter.value) {
                    params.set("status", statusFilter.value);
                }

                const projectPage = await ApiClient.get(`/api/student/projects?${params.toString()}`);
                const list = Array.isArray(projectPage?.records) ? projectPage.records : [];
                const total = Number(projectPage?.total || list.length);
                const pageSize = getResolvedPageSize(projectPage, list.length);
                const currentPage = Math.max(1, Number(projectPage?.pageNum || pageNum || 1));
                const totalPages = Math.max(1, Number(projectPage?.totalPages || Math.ceil(total / pageSize) || 1));

                state.currentPage = currentPage;
                state.pageSize = pageSize;
                state.total = total;
                state.totalPages = totalPages;

                renderRows(list);
                projectCountSpan.textContent = String(total);
                renderPagination();
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#888;">加载失败：${esc(error.message || "请稍后重试")}</td></tr>`;
                projectCountSpan.textContent = "0";
                paginationBar.hidden = true;
                paginationPages.innerHTML = "";
                paginationSummary.textContent = "";
            }
        }

        async function initPage() {
            try {
                const [requests] = await Promise.all([
                    ApiClient.get("/api/student/requests"),
                    loadTags(),
                    loadCategories()
                ]);
                state.requests = Array.isArray(requests) ? requests : [];
                await loadProjects(1);
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#888;">加载失败：${esc(error.message || "请稍后重试")}</td></tr>`;
                projectCountSpan.textContent = "0";
            }
        }

        prevPageBtn.addEventListener("click", function () {
            if (state.currentPage > 1) {
                loadProjects(state.currentPage - 1);
            }
        });

        nextPageBtn.addEventListener("click", function () {
            if (state.currentPage < state.totalPages) {
                loadProjects(state.currentPage + 1);
            }
        });

        paginationPages.addEventListener("click", function (event) {
            const button = event.target.closest("[data-page]");
            if (!button) return;
            const page = Number(button.getAttribute("data-page"));
            if (Number.isInteger(page) && page > 0 && page !== state.currentPage) {
                loadProjects(page);
            }
        });

        tagFilterBar.addEventListener("click", function (event) {
            const tagButton = event.target.closest("[data-tag-id]");
            if (tagButton) {
                const tagId = tagButton.getAttribute("data-tag-id");
                if (state.selectedTagIds.has(tagId)) {
                    state.selectedTagIds.delete(tagId);
                } else {
                    state.selectedTagIds.add(tagId);
                }
                renderTagFilters();
                loadProjects(1);
                return;
            }

            if (event.target.closest("#clearTagFiltersBtn")) {
                state.selectedTagIds.clear();
                renderTagFilters();
                loadProjects(1);
            }
        });

        let keywordTimer = null;
        keywordFilter.addEventListener("input", () => {
            window.clearTimeout(keywordTimer);
            keywordTimer = window.setTimeout(() => loadProjects(1), 250);
        });
        categoryFilter.addEventListener("change", () => loadProjects(1));
        statusFilter.addEventListener("change", () => loadProjects(1));
        clearProjectFiltersBtn.addEventListener("click", () => {
            keywordFilter.value = "";
            categoryFilter.value = "";
            statusFilter.value = "";
            state.selectedTagIds.clear();
            renderTagFilters();
            loadProjects(1);
        });

        initPage();
    })();
    //default sidebar toggle behavior
    const layout = document.getElementById("layout");
    const toggle = document.getElementById("toggleSidebar");
    let isCollapsed = false;
    toggle.addEventListener("click", () => {
        isCollapsed = !isCollapsed;
        layout.classList.toggle("collapsed", isCollapsed);
    });
</script>

</body>
</html>
