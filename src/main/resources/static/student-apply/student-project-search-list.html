<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>项目列表 · SURF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/studentsp.css" />

</head>
<body>
<div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="#" class="active" style="pointer-events: none; cursor: default;">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <a href="student-dashboard.html" class="back-link">← 返回工作台</a>
            <h1>📋 开放项目目录</h1>
        </div>
        <div class="panel-card">
            <p style="color: var(--muted); margin-bottom: 10px;">点击 "View" 在新页面查看项目详情</p>
            <div class="table-wrapper">
                <table class="project-table" id="projectTable">
                    <thead>
                        <tr>
                            <th>SURF Code</th><th>Project Title</th><th>Principal Investigator</th>
                            <th>Email</th><th>School/Academy</th><th>Department</th>
                            <th>Required</th><th>Internal/External</th><th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div style="margin-top: 16px; font-size: 0.9rem;">
                ⚡ 共 <span id="projectCount">0</span> 个项目
            </div>
        </div>
        <div class="footnote">* 点击 View 跳转至详情页</div>
    </main>
</div>

<script>
    (function() {
        const projectsData = [
            { surfCode: 'SURF-2025-01', title: 'Generative AI for Personalized Learning Pathways', pi: 'Dr. Elena Rodriguez', piEmail: 'e.rodriguez@university.edu', school: 'School of Computing', department: 'AI & Data Science', requiredStudents: 3, internalExternal: 'Internal', coInvestigator: 'Prof. Michael Chen', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-07', title: 'Sustainable Urban Green Spaces: GIS and Remote Sensing', pi: 'Dr. Sarah Whitman', piEmail: 's.whitman@university.edu', school: 'School of Environmental Science', department: 'Geography & Planning', requiredStudents: 2, internalExternal: 'External', coInvestigator: 'Dr. James Park', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-12', title: 'Blockchain-based Credential Verification', pi: 'Prof. David Kumar', piEmail: 'd.kumar@university.edu', school: 'School of Business & Technology', department: 'Information Systems', requiredStudents: 4, internalExternal: 'Internal', coInvestigator: 'Dr. Lisa Wong', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-19', title: 'Neurocognitive Markers of Second Language Acquisition', pi: 'Dr. Anna Fischer', piEmail: 'a.fischer@university.edu', school: 'Faculty of Humanities', department: 'Linguistics & Cognitive Science', requiredStudents: 2, internalExternal: 'Internal', coInvestigator: 'Dr. Robert Liu', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-22', title: 'Low-Cost Water Quality Monitoring using IoT Sensors', pi: 'Prof. Ming Zhao', piEmail: 'm.zhao@university.edu', school: 'School of Engineering', department: 'Electrical & Computer Engineering', requiredStudents: 3, internalExternal: 'External', coInvestigator: 'Dr. Susan Mwangi', abstract: '...', learningOutcomes: '...', requirements: '...' }
        ];

        const tbody = document.getElementById('tableBody');
        const projectCountSpan = document.getElementById('projectCount');
        let html = '';
        projectsData.forEach(proj => {
            html += `<tr>
                <td><strong>${proj.surfCode}</strong></td><td>${proj.title}</td><td>${proj.pi}</td>
                <td><a href="mailto:${proj.piEmail}" style="color:var(--deep);">${proj.piEmail}</a></td>
                <td>${proj.school}</td><td>${proj.department}</td><td>${proj.requiredStudents}</td>
                <td><span style="background:rgba(90,43,152,0.1); padding:4px 10px; border-radius:30px;">${proj.internalExternal}</span></td>
                <td><a class="view-btn" href="student-project-search-list-detail.html?code=${encodeURIComponent(proj.surfCode)}">View</a></td>
            </tr>`;
        });
        tbody.innerHTML = html;
        projectCountSpan.textContent = projectsData.length;
    })();

    const layout = document.getElementById("layout");
    const toggle = document.getElementById("toggleSidebar");
    let isCollapsed = false;
    toggle.addEventListener("click", () => {
        isCollapsed = !isCollapsed;
        layout.classList.toggle("collapsed", isCollapsed);
    });
</script>
</body>
</html>
