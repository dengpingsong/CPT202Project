<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>项目列表 · SURF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        /* ===== 与 dashboard 完全一致的样式 ===== */
        :root {
            --bg: #f4f3f7;
            --deep: #5a2b98;
            --mid: #7b4fbd;
            --panel: #ffffff;
            --text: #1c1b33;
            --muted: #6b6b82;
            --accent: #24b3ff;
            --orange: #f6a63d;
            --green: #2fc5a8;
            --border: rgba(28, 27, 51, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            transition: grid-template-columns .3s ease;
        }
        .layout.collapsed {
            grid-template-columns: 80px 1fr;
        }
        .sidebar {
            background: linear-gradient(180deg, #3d1566, #631e97);
            padding: 24px 16px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }
        .sidebar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255,255,255,0.2), transparent 60%);
            pointer-events: none;
        }
        .toggle-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            margin-bottom: 4px;
        }
        .toggle {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .3s ease;
            position: relative;
        }
        .toggle span, .toggle span::before, .toggle span::after {
            display: block;
            width: 22px;
            height: 2px;
            background: white;
            transition: all .3s ease;
            position: absolute;
        }
        .toggle span { background: transparent; }
        .toggle span::before { content: ""; top: 0; transform: rotate(45deg); }
        .toggle span::after { content: ""; top: 0; transform: rotate(-45deg); }
        .layout.collapsed .toggle span { background: white; }
        .layout.collapsed .toggle span::before { top: -8px; transform: none; }
        .layout.collapsed .toggle span::after { top: 8px; transform: none; }
        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }
        .nav-group button, .nav-group a {
            border: none;
            background: transparent;
            color: white;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s, padding .2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
            text-decoration: none;
        }
        .nav-group button.active, .nav-group a.active,
        .nav-group button:hover, .nav-group a:hover {
            background: rgba(255,255,255,0.2);
        }
        .nav-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }
        .nav-label {
            transition: opacity .3s ease;
            white-space: nowrap;
        }
        .layout.collapsed .nav-group button,
        .layout.collapsed .nav-group a {
            justify-content: center;
            padding: 12px;
        }
        .layout.collapsed .nav-label {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }
        .main {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .panel-card {
            background: var(--panel);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(21,16,45,0.15);
            padding: 24px 28px;
        }
        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 8px;
        }
        .page-header h1 {
            font-weight: 600;
            font-size: 1.8rem;
            color: var(--text);
        }
        .back-link {
            color: var(--deep);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 30px;
            background: rgba(90,43,152,0.1);
            transition: background 0.2s;
        }
        .back-link:hover { background: rgba(90,43,152,0.2); }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 18px;
            margin-top: 16px;
        }
        .project-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
            font-size: 0.9rem;
        }
        .project-table th {
            text-align: left;
            padding: 16px;
            background: #f8f5ff;
            font-weight: 600;
            color: var(--deep);
            border-bottom: 2px solid rgba(90,43,152,0.2);
        }
        .project-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(156,156,178,0.2);
        }
        .project-table tbody tr:hover { background: rgba(90,43,152,0.03); }
        .view-btn {
            background: white;
            border: 1.5px solid var(--deep);
            color: var(--deep);
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .view-btn:hover {
            background: var(--deep);
            color: white;
        }
        .footnote {
            margin-top: 16px;
            color: var(--muted);
            font-size: 0.8rem;
            text-align: right;
        }
        @media (max-width: 960px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { flex-direction: row; gap: 8px; padding: 12px; }
            .sidebar::after { display: none; }
            .layout.collapsed { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-list.html" class="active">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <button>
                <i class="bi bi-person-badge nav-icon"></i>
                <span class="nav-label">热门导师</span>
            </button>
            <button>
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </button>
            <button>
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </button>
            <button>
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </button>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <a href="student-dashboard.html" class="back-link">← 返回工作台</a>
            <h1>📋 开放项目目录</h1>
        </div>
        <div class="panel-card">
            <p style="color: var(--muted); margin-bottom: 10px;">点击 "View" 在新页面查看项目详情</p>
            <div class="table-wrapper">
                <table class="project-table" id="projectTable">
                    <thead>
                        <tr>
                            <th>SURF Code</th><th>Project Title</th><th>Principal Investigator</th>
                            <th>Email</th><th>School/Academy</th><th>Department</th>
                            <th>Required</th><th>Internal/External</th><th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div style="margin-top: 16px; font-size: 0.9rem;">
                ⚡ 共 <span id="projectCount">0</span> 个项目
            </div>
        </div>
        <div class="footnote">* 点击 View 跳转至详情页</div>
    </main>
</div>

<script>
    (function() {
        const projectsData = [
            { surfCode: 'SURF-2025-01', title: 'Generative AI for Personalized Learning Pathways', pi: 'Dr. Elena Rodriguez', piEmail: 'e.rodriguez@university.edu', school: 'School of Computing', department: 'AI & Data Science', requiredStudents: 3, internalExternal: 'Internal', coInvestigator: 'Prof. Michael Chen', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-07', title: 'Sustainable Urban Green Spaces: GIS and Remote Sensing', pi: 'Dr. Sarah Whitman', piEmail: 's.whitman@university.edu', school: 'School of Environmental Science', department: 'Geography & Planning', requiredStudents: 2, internalExternal: 'External', coInvestigator: 'Dr. James Park', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-12', title: 'Blockchain-based Credential Verification', pi: 'Prof. David Kumar', piEmail: 'd.kumar@university.edu', school: 'School of Business & Technology', department: 'Information Systems', requiredStudents: 4, internalExternal: 'Internal', coInvestigator: 'Dr. Lisa Wong', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-19', title: 'Neurocognitive Markers of Second Language Acquisition', pi: 'Dr. Anna Fischer', piEmail: 'a.fischer@university.edu', school: 'Faculty of Humanities', department: 'Linguistics & Cognitive Science', requiredStudents: 2, internalExternal: 'Internal', coInvestigator: 'Dr. Robert Liu', abstract: '...', learningOutcomes: '...', requirements: '...' },
            { surfCode: 'SURF-2025-22', title: 'Low-Cost Water Quality Monitoring using IoT Sensors', pi: 'Prof. Ming Zhao', piEmail: 'm.zhao@university.edu', school: 'School of Engineering', department: 'Electrical & Computer Engineering', requiredStudents: 3, internalExternal: 'External', coInvestigator: 'Dr. Susan Mwangi', abstract: '...', learningOutcomes: '...', requirements: '...' }
        ];

        const tbody = document.getElementById('tableBody');
        const projectCountSpan = document.getElementById('projectCount');
        let html = '';
        projectsData.forEach(proj => {
            html += `<tr>
                <td><strong>${proj.surfCode}</strong></td><td>${proj.title}</td><td>${proj.pi}</td>
                <td><a href="mailto:${proj.piEmail}" style="color:var(--deep);">${proj.piEmail}</a></td>
                <td>${proj.school}</td><td>${proj.department}</td><td>${proj.requiredStudents}</td>
                <td><span style="background:rgba(90,43,152,0.1); padding:4px 10px; border-radius:30px;">${proj.internalExternal}</span></td>
                <td><a class="view-btn" href="student-project-search-list-detail.html?code=${encodeURIComponent(proj.surfCode)}">View</a></td>
            </tr>`;
        });
        tbody.innerHTML = html;
        projectCountSpan.textContent = projectsData.length;
    })();

    const layout = document.getElementById("layout");
    const toggle = document.getElementById("toggleSidebar");
    let isCollapsed = false;
    toggle.addEventListener("click", () => {
        isCollapsed = !isCollapsed;
        layout.classList.toggle("collapsed", isCollapsed);
    });
</script>
</body>
</html>
