<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>消息通知 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/studentsp.css" />
    <style>
        /* 微调操作栏样式以保持与整体一致 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .unread-badge {
            background: var(--orange);
            color: white;
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 12px;
        }
        .mark-all-read {
            background: transparent;
            border: 1.5px solid var(--muted);
            color: var(--muted);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .mark-all-read:hover {
            border-color: var(--deep);
            color: var(--deep);
            background: rgba(90, 43, 152, 0.04);
        }
        .action-icon-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .action-icon-btn:hover {
            background: rgba(90, 43, 152, 0.08);
            color: var(--deep);
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏（已移除“热门导师”） -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <!-- 热门导师按钮已移除 -->
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="#" class="active" style="pointer-events: none; cursor: default;">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区域（结构与教师端统一） -->
    <main class="main">
        <header class="page-header">
            <h1 class="mb-0">🔔 消息与通知</h1>
        </header>

        <!-- 操作栏：未读计数 + 全部已读 -->
        <div class="action-bar">
            <div>
                <span style="font-weight: 600; color: var(--text);">
                    <i class="bi bi-bell"></i> 通知中心
                </span>
                <span class="unread-badge" id="unreadCountDisplay">3 条未读</span>
            </div>
            <button class="mark-all-read" id="markAllReadBtn">
                <i class="bi bi-check-all"></i> 全部标为已读
            </button>
        </div>

        <!-- 通知列表（动态渲染，结构与教师端一致） -->
        <div class="notification-list mt-3" id="notificationList">
            <!-- 动态渲染 -->
        </div>

        <div class="footnote">
            <i class="bi bi-info-circle"></i> 点击消息可查看详情，重要通知请及时处理
        </div>
    </main>
</div>

<script>
    (function() {
        "use strict";

        // ---------- 模拟通知数据 ----------
        let notifications = [
            {
                id: 'n1',
                type: 'application',
                title: '申请状态更新',
                message: '您对“智能教学系统研究”的申请已被导师查看，目前状态为“待审批”。',
                time: '2025-04-13 09:24',
                read: false,
                link: '#'
            },
            {
                id: 'n2',
                type: 'approval',
                title: '项目申请通过',
                message: '恭喜！您申请的“区块链证书验证”项目已被周教授同意，请及时联系导师确认后续安排。',
                time: '2025-03-01 14:15',
                read: true,
                link: '#'
            },
            {
                id: 'n3',
                type: 'feedback',
                title: '导师反馈',
                message: '王老师对您的申请“校园智慧导航系统”给出了反馈：“名额已满，欢迎下次合作”。',
                time: '2025-04-02 10:03',
                read: false,
                link: '#'
            },
            {
                id: 'n4',
                type: 'system',
                title: '系统提醒',
                message: '您有一项待处理的申请已超过7天，建议主动联系导师或考虑其他项目。',
                time: '2025-04-12 16:30',
                read: false,
                link: '#'
            },
            {
                id: 'n5',
                type: 'message',
                title: '导师私信',
                message: '李老师：你好，关于智能教学系统项目，能否补充一下你在可视化方面的经验？',
                time: '2025-04-11 19:02',
                read: true,
                link: '#'
            },
            {
                id: 'n6',
                type: 'deadline',
                title: '截止日期提醒',
                message: '“实验室管理大屏”项目的申请截止日期为2025-04-20，请尽快提交申请材料。',
                time: '2025-04-10 08:00',
                read: true,
                link: '#'
            }
        ];

        // DOM 元素
        const notificationListEl = document.getElementById('notificationList');
        const unreadCountDisplay = document.getElementById('unreadCountDisplay');
        const markAllReadBtn = document.getElementById('markAllReadBtn');

        // 更新未读数量显示
        function updateUnreadCount() {
            const unreadCount = notifications.filter(n => !n.read).length;
            unreadCountDisplay.textContent = unreadCount === 0 ? '暂无未读' : `${unreadCount} 条未读`;
        }

        // 渲染通知列表（结构与教师端统一）
        function renderNotifications() {
            if (!notificationListEl) return;

            if (notifications.length === 0) {
                notificationListEl.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-bell-slash" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        <p style="font-size:1.1rem; margin-top: 12px;">暂无通知消息</p>
                        <p style="font-size:0.9rem;">当有新的申请动态或导师消息时会显示在这里</p>
                    </div>
                `;
                updateUnreadCount();
                return;
            }

            let html = '';
            // 未读优先
            notifications.sort((a, b) => (a.read === b.read) ? 0 : a.read ? 1 : -1);

            notifications.forEach(item => {
                const unreadClass = item.read ? '' : 'unread';
                const iconType = {
                    'application': 'bi-file-text',
                    'approval': 'bi-check-circle',
                    'feedback': 'bi-chat-quote',
                    'system': 'bi-info-circle',
                    'message': 'bi-envelope',
                    'deadline': 'bi-calendar-exclamation'
                }[item.type] || 'bi-bell';

                html += `
                    <div class="notification-item ${unreadClass}" data-id="${item.id}">
                        <div class="notification-icon">
                            <i class="bi ${iconType}"></i>
                        </div>
                        <div class="msg-body">
                            <div class="notification-title">
                                ${item.title}
                                ${!item.read ? '<span class="unread-dot"></span>' : ''}
                            </div>
                            <div class="notification-message">${item.message}</div>
                            <div class="notification-meta">
                                <span><i class="bi bi-clock"></i> ${item.time}</span>
                                <span><i class="bi bi-tag"></i> ${item.type}</span>
                            </div>
                        </div>
                        <div class="notification-actions" style="display: flex; gap: 8px; align-items: center;">
                            ${!item.read ?
                    `<button class="action-icon-btn mark-read-btn" data-id="${item.id}" title="标为已读">
                                    <i class="bi bi-check-lg"></i> 已读
                                </button>` : ''}
                            <button class="action-icon-btn" title="查看详情" onclick="alert('详情功能开发中')">
                                <i class="bi bi-arrow-right-circle"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            notificationListEl.innerHTML = html;
            updateUnreadCount();

            // 绑定单条“标为已读”按钮事件
            document.querySelectorAll('.mark-read-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const notif = notifications.find(n => n.id === id);
                    if (notif) {
                        notif.read = true;
                        renderNotifications();
                    }
                });
            });

            // 点击通知项也可标记为已读（避开按钮点击）
            document.querySelectorAll('.notification-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    const id = item.getAttribute('data-id');
                    const notif = notifications.find(n => n.id === id);
                    if (notif && !notif.read) {
                        notif.read = true;
                        renderNotifications();
                    }
                });
            });
        }

        // 全部标为已读
        markAllReadBtn.addEventListener('click', () => {
            notifications.forEach(n => n.read = true);
            renderNotifications();
        });

        // 初始化渲染
        renderNotifications();

        // ---------- 侧边栏折叠功能 ----------
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

    })();
</script>
</body>
</html>
