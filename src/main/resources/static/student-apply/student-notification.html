<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>消息通知 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/studentsp.css" />
    <style>
        .notification-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        .notification-actions { display: flex; gap: 8px; align-items: center; }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏（已移除“热门导师”） -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <!-- 热门导师按钮已移除 -->
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="#" class="active" style="pointer-events: none; cursor: default;">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息通知</span>
            </a>
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区域（结构与教师端统一） -->
    <main class="main">
        <header class="page-header">
            <h1 class="mb-0">消息与系统通知</h1>
        </header>

        <div class="notification-toolbar">
            <div id="notificationStatus" class="footnote" style="text-align:left;">正在加载通知...</div>
            <button class="btn-secondary" id="markAllReadBtn" type="button" style="padding: 8px 14px;">全部已读</button>
        </div>

        <div class="notification-list" id="notificationList" style="margin-top: 16px;">
            <div class="notification-item">
                <div class="notification-icon">
                    <i class="bi bi-hourglass-split"></i>
                </div>
                <div class="msg-body">
                    <div class="notification-title">正在加载通知</div>
                    <div class="notification-message">请稍候</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";

        const user = ApiClient.requireAuth("STUDENT");
        if (!user) return;

        let notifications = [];//保存页面上的通知列表
        const readStorageKey = `studentNotificationRead:${user.userId || user.username || "current"}`;//记录哪些通知已经读过

        const notificationListEl = document.getElementById('notificationList');
        const notificationStatus = document.getElementById('notificationStatus');
        const markAllReadBtn = document.getElementById('markAllReadBtn');

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeStatus(status) {
            return String(status || "UNKNOWN").toUpperCase();
        }

        //读取 已读 记录
        function readMap() {
            try {
                return JSON.parse(localStorage.getItem(readStorageKey) || "{}");
            } catch (error) {
                return {};
            }
        }

        function saveRead(id) {
            const map = readMap();
            map[id] = true;
            localStorage.setItem(readStorageKey, JSON.stringify(map));
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 16);
            return date.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }
        //优先级选时间
        function notificationTime(request) {
            return request.reviewedAt || request.withdrawnAt || request.submittedAt;
        }

        function notificationType(status) {
            if (status === "PENDING") return "new";
            if (status === "WITHDRAWN") return "withdrawn";
            if (status === "ACCEPTED") return "accepted";
            if (status === "REJECTED") return "rejected";
            return "system";
        }

        function notificationTitle(status) {
            if (status === "PENDING") return "申请已提交";
            if (status === "WITHDRAWN") return "申请已撤回";
            if (status === "ACCEPTED") return "申请已同意";
            if (status === "REJECTED") return "申请已拒绝";
            return "申请状态更新";
        }

        function notificationMessage(request, status) {
            const projectTitle = request.projectTitle || "未命名项目";
            if (status === "ACCEPTED") {
                return `恭喜！你申请的“${projectTitle}”项目已通过，请及时确认后续安排。`;
            }
            if (status === "REJECTED") {
                const comment = request.decisionComment ? `反馈：“${request.decisionComment}”` : "请查看其他可申请项目。";
                return `你申请的“${projectTitle}”项目未通过，${comment}`;
            }
            if (status === "WITHDRAWN") {
                return `你已撤回“${projectTitle}”项目申请。`;
            }
            if (status === "PENDING") {
                return `你对“${projectTitle}”项目的申请已提交，目前正在等待审核。`;
            }
            return `“${projectTitle}”项目申请状态已更新为 ${status}。`;
        }

        function iconClass(type) {
            const map = {
                new: "bi-envelope-paper",
                withdrawn: "bi-exclamation-triangle",
                accepted: "bi-check-circle",
                rejected: "bi-x-circle",
                system: "bi-info-circle"
            };
            return map[type] || "bi-bell";
        }

        function iconStyle(type) {
            if (type === "withdrawn" || type === "rejected") return "background: rgba(246,166,61,0.1); color: var(--orange);";
            if (type === "accepted") return "background: rgba(47,197,168,0.12); color: var(--green);";
            return "";
        }

        //****核心*****
        function buildNotifications(requests) {
            const map = readMap();
            return requests.map(request => {
                const status = normalizeStatus(request.requestStatus);
                const time = notificationTime(request);
                const id = `request-${request.requestId}-${status}-${time || "unknown"}`;//生成通知的唯一 ID。
                //它包含三部分：申请 ID、状态、时间
                return {
                    id,
                    type: notificationType(status),
                    title: notificationTitle(status),
                    message: notificationMessage(request, status),
                    time,
                    status,
                    read: Boolean(map[id]),
                    projectId: request.projectId,
                    requestId: request.requestId
                };
            }).sort((a, b) => {
                if (a.read !== b.read) return a.read ? 1 : -1;
                return new Date(b.time || 0) - new Date(a.time || 0);
            });
        }

        function setStatus(message, type) {
            if (!notificationStatus) return;
            notificationStatus.textContent = message;
            notificationStatus.style.color = type === "error" ? "#c74545" : "var(--muted)";
        }

        //通知列表
        function renderNotifications() {
            if (!notificationListEl) return;

            if (notifications.length === 0) {
                notificationListEl.innerHTML = `
                    <div class="notification-item">
                        <div class="notification-icon"><i class="bi bi-bell-slash"></i></div>
                        <div class="msg-body">
                            <div class="notification-title">暂无通知</div>
                            <div class="notification-message">有新的申请动态后会显示在这里。</div>
                        </div>
                    </div>
                `;
                setStatus("当前没有通知。", "");
                markAllReadBtn.disabled = true;
                return;
            }

            const unreadCount = notifications.filter(item => !item.read).length;
            notificationListEl.innerHTML = notifications.map(item => `
                <div class="notification-item ${item.read ? "" : "unread"}" data-id="${esc(item.id)}">
                    <div class="notification-icon" style="${iconStyle(item.type)}">
                        <i class="bi ${iconClass(item.type)}"></i>
                    </div>
                    <div class="msg-body">
                        <div class="notification-title">
                            ${esc(item.title)}
                            ${!item.read ? '<span class="unread-dot"></span>' : ''}
                        </div>
                        <div class="notification-message">${esc(item.message)}</div>
                        <div class="notification-meta">
                            <span><i class="bi bi-clock"></i> ${esc(formatDate(item.time))}</span>
                            <span><i class="bi bi-tag"></i> ${esc(item.status)}</span>
                        </div>
                    </div>
                    <div class="notification-actions">
                        ${!item.read ? `<button class="btn-secondary mark-read-btn" data-id="${esc(item.id)}" type="button" style="padding: 6px 10px;">已读</button>` : ""}
                        <button class="btn-secondary detail-btn" data-project-id="${esc(item.projectId)}" type="button" style="padding: 6px 10px;">
                            <i class="bi bi-arrow-right-circle"></i>
                        </button>
                    </div>
                </div>
            `).join("");

            setStatus(unreadCount === 0 ? "暂无未读通知。" : `${unreadCount} 条未读通知。`, "");
            markAllReadBtn.disabled = unreadCount === 0;

            // 绑定按钮
            document.querySelectorAll('.mark-read-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const notif = notifications.find(n => n.id === id);
                    if (notif) {
                        notif.read = true;
                        saveRead(id);
                        renderNotifications();
                    }
                });
            });
            //*******逻辑再理解一下********
            document.querySelectorAll('.detail-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const projectId = btn.getAttribute('data-project-id');
                    if (projectId && projectId !== "null" && projectId !== "undefined") {
                        window.location.href = `student-project-search-list-detail.html?projectId=${encodeURIComponent(projectId)}&from=notification`;
                    }
                });
            });

            document.querySelectorAll('.notification-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    const id = item.getAttribute('data-id');
                    const notif = notifications.find(n => n.id === id);
                    if (notif && !notif.read) {
                        notif.read = true;
                        saveRead(id);
                        renderNotifications();
                    }
                });
            });
        }

        // 全部标为已读
        markAllReadBtn.addEventListener('click', () => {
            notifications.forEach(n => {
                n.read = true;
                saveRead(n.id);
            });
            renderNotifications();
        });

        async function initNotifications() {
            try {
                notificationListEl.innerHTML = `
                    <div class="notification-item">
                        <div class="notification-icon"><i class="bi bi-hourglass-split"></i></div>
                        <div class="msg-body">
                            <div class="notification-title">正在加载通知</div>
                            <div class="notification-message">请稍候</div>
                        </div>
                    </div>
                `;
                setStatus("正在加载通知...", "");

                const requests = await ApiClient.get("/api/student/requests");
                notifications = buildNotifications(Array.isArray(requests) ? requests : []);
                renderNotifications();
            } catch (error) {
                console.error(error);
                notificationListEl.innerHTML = `
                    <div class="notification-item">
                        <div class="notification-icon"><i class="bi bi-exclamation-circle"></i></div>
                        <div class="msg-body">
                            <div class="notification-title" style="color:#c74545;">通知加载失败</div>
                            <div class="notification-message">${esc(error.message || "请稍后重试")}</div>
                        </div>
                    </div>
                `;
                setStatus(error.message || "通知加载失败。", "error");
            }
        }

        initNotifications();

        //default sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

    })();
</script>
</body>
</html>
