<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>消息通知 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/studentsp.css" />
    <style>
        /* 微调操作栏样式以保持与整体一致 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .unread-badge {
            background: var(--orange);
            color: white;
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 12px;
        }
        .mark-all-read {
            background: transparent;
            border: 1.5px solid var(--muted);
            color: var(--muted);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .mark-all-read:hover {
            border-color: var(--deep);
            color: var(--deep);
            background: rgba(90, 43, 152, 0.04);
        }
        .action-icon-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .action-icon-btn:hover {
            background: rgba(90, 43, 152, 0.08);
            color: var(--deep);
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏（已移除“热门导师”） -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <!-- 热门导师按钮已移除 -->
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="#" class="active" style="pointer-events: none; cursor: default;">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息通知</span>
            </a>
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区域（结构与教师端统一） -->
    <main class="main">
        <header class="page-header">
            <h1 class="mb-0">🔔 消息与通知</h1>
        </header>

        <!-- 操作栏：未读计数 + 全部已读 -->
        <div class="action-bar">
            <div>
                <span style="font-weight: 600; color: var(--text);">
                    <i class="bi bi-bell"></i> 通知中心
                </span>
                <span class="unread-badge" id="unreadCountDisplay">加载中</span>
            </div>
            <button class="mark-all-read" id="markAllReadBtn">
                <i class="bi bi-check-all"></i> 全部标为已读
            </button>
        </div>

        <!-- 通知列表（动态渲染，结构与教师端一致） -->
        <div class="notification-list mt-3" id="notificationList">
            <!-- 动态渲染 -->
        </div>

        <div class="footnote">
            <i class="bi bi-info-circle"></i> 点击消息可查看详情，重要通知请及时处理
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";

        const user = ApiClient.requireAuth("STUDENT");
        if (!user) return;

        let notifications = [];//保存页面上的通知列表
        const readStorageKey = `studentNotificationRead:${user.userId || user.username || "current"}`;//记录哪些通知已经读过

        const notificationListEl = document.getElementById('notificationList');
        const unreadCountDisplay = document.getElementById('unreadCountDisplay');
        const markAllReadBtn = document.getElementById('markAllReadBtn');

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function normalizeStatus(status) {
            return String(status || "UNKNOWN").toUpperCase();
        }

        //读取 已读 记录
        function readMap() {
            try {
                return JSON.parse(localStorage.getItem(readStorageKey) || "{}");
            } catch (error) {
                return {};
            }
        }

        function saveRead(id) {
            const map = readMap();
            map[id] = true;
            localStorage.setItem(readStorageKey, JSON.stringify(map));
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 16);
            return date.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }
        //优先级选时间
        function notificationTime(request) {
            return request.reviewedAt || request.withdrawnAt || request.submittedAt;
        }

        function notificationType(status) {
            if (status === "ACCEPTED") return "approval";
            if (status === "REJECTED") return "feedback";
            if (status === "WITHDRAWN") return "system";
            return "application";
        }

        function notificationTitle(status) {
            if (status === "ACCEPTED") return "项目申请通过";
            if (status === "REJECTED") return "项目申请未通过";
            if (status === "WITHDRAWN") return "申请已撤回";
            if (status === "PENDING") return "申请已提交";
            return "申请状态更新";
        }

        function notificationMessage(request, status) {
            const projectTitle = request.projectTitle || "未命名项目";
            if (status === "ACCEPTED") {
                return `恭喜！你申请的“${projectTitle}”项目已通过，请及时确认后续安排。`;
            }
            if (status === "REJECTED") {
                const comment = request.decisionComment ? `反馈：“${request.decisionComment}”` : "请查看其他可申请项目。";
                return `你申请的“${projectTitle}”项目未通过，${comment}`;
            }
            if (status === "WITHDRAWN") {
                return `你已撤回“${projectTitle}”项目申请。`;
            }
            if (status === "PENDING") {
                return `你对“${projectTitle}”项目的申请已提交，目前正在等待审核。`;
            }
            return `“${projectTitle}”项目申请状态已更新为 ${status}。`;
        }

        //****核心*****
        function buildNotifications(requests) {
            const map = readMap();
            return requests.map(request => {
                const status = normalizeStatus(request.requestStatus);
                const time = notificationTime(request);
                const id = `request-${request.requestId}-${status}-${time || "unknown"}`;//生成通知的唯一 ID。
                //它包含三部分：申请 ID、状态、时间
                return {
                    id,
                    type: notificationType(status),
                    title: notificationTitle(status),
                    message: notificationMessage(request, status),
                    time,
                    status,
                    read: Boolean(map[id]),
                    projectId: request.projectId,
                    requestId: request.requestId
                };
            });
        }

        // 更新未读数量
        function updateUnreadCount() {
            const unreadCount = notifications.filter(n => !n.read).length;
            unreadCountDisplay.textContent = unreadCount === 0 ? '暂无未读' : `${unreadCount} 条未读`;
            markAllReadBtn.disabled = unreadCount === 0;
        }

        //通知列表
        function renderNotifications() {
            if (!notificationListEl) return;

            if (notifications.length === 0) {
                notificationListEl.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-bell-slash" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        <p style="font-size:1.1rem; margin-top: 12px;">暂无通知消息</p>
                        <p style="font-size:0.9rem;">当有新的申请动态或导师消息时会显示在这里</p>
                    </div>
                `;
                updateUnreadCount();
                return;
            }

            notifications.sort((a, b) => {
                if (a.read !== b.read) return a.read ? 1 : -1;
                return new Date(b.time || 0) - new Date(a.time || 0);
            });

            const html = notifications.map(item => {
                const unreadClass = item.read ? '' : 'unread';
                const iconType = {
                    'application': 'bi-file-text',
                    'approval': 'bi-check-circle',
                    'feedback': 'bi-chat-quote',
                    'system': 'bi-info-circle',
                    'message': 'bi-envelope',
                    'deadline': 'bi-calendar-exclamation'
                }[item.type] || 'bi-bell';

                return `
                    <div class="notification-item ${unreadClass}" data-id="${item.id}">
                        <div class="notification-icon">
                            <i class="bi ${iconType}"></i>
                        </div>
                        <div class="msg-body">
                            <div class="notification-title">
                                ${esc(item.title)}
                                ${!item.read ? '<span class="unread-dot"></span>' : ''}
                            </div>
                            <div class="notification-message">${esc(item.message)}</div>
                            <div class="notification-meta">
                                <span><i class="bi bi-clock"></i> ${esc(formatDate(item.time))}</span>
                                <span><i class="bi bi-tag"></i> ${esc(item.status)}</span>
                            </div>
                        </div>
                        <div class="notification-actions" style="display: flex; gap: 8px; align-items: center;">
                            ${!item.read ?
                    `<button class="action-icon-btn mark-read-btn" data-id="${item.id}" title="标为已读">
                                    <i class="bi bi-check-lg"></i> 已读
                                </button>` : ''}
                            <button class="action-icon-btn detail-btn" data-project-id="${esc(item.projectId)}" title="查看详情">
                                <i class="bi bi-arrow-right-circle"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join("");

            notificationListEl.innerHTML = html;
            updateUnreadCount();

            // 绑定按钮
            document.querySelectorAll('.mark-read-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const notif = notifications.find(n => n.id === id);
                    if (notif) {
                        notif.read = true;
                        saveRead(id);
                        renderNotifications();
                    }
                });
            });
            //*******逻辑再理解一下********
            document.querySelectorAll('.detail-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const projectId = btn.getAttribute('data-project-id');
                    if (projectId && projectId !== "null" && projectId !== "undefined") {
                        window.location.href = `student-project-search-list-detail.html?projectId=${encodeURIComponent(projectId)}&from=notification`;
                    }
                });
            });

            document.querySelectorAll('.notification-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    const id = item.getAttribute('data-id');
                    const notif = notifications.find(n => n.id === id);
                    if (notif && !notif.read) {
                        notif.read = true;
                        saveRead(id);
                        renderNotifications();
                    }
                });
            });
        }

        // 全部标为已读
        markAllReadBtn.addEventListener('click', () => {
            notifications.forEach(n => {
                n.read = true;
                saveRead(n.id);
            });
            renderNotifications();
        });

        async function initNotifications() {
            try {
                notificationListEl.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-hourglass-split" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        <p style="font-size:1.1rem; margin-top: 12px;">正在加载通知</p>
                    </div>
                `;

                const requests = await ApiClient.get("/api/student/requests");
                notifications = buildNotifications(Array.isArray(requests) ? requests : []);
                renderNotifications();
            } catch (error) {
                console.error(error);
                unreadCountDisplay.textContent = "加载失败";
                notificationListEl.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-circle" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        <p style="font-size:1.1rem; margin-top: 12px;">通知加载失败</p>
                        <p style="font-size:0.9rem;">${esc(error.message || "请稍后重试")}</p>
                    </div>
                `;
            }
        }

        initNotifications();

        //default sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

    })();
</script>
</body>
</html>
