<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>个人设置 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        /* ----- 全局变量 & 基础样式 (完全沿用 dashboard 设计语言) ----- */
        :root {
            --bg: #f4f3f7;
            --deep: #5a2b98;
            --mid: #7b4fbd;
            --panel: #ffffff;
            --text: #1c1b33;
            --muted: #6b6b82;
            --accent: #24b3ff;
            --orange: #f6a63d;
            --green: #2fc5a8;
            --border: rgba(28, 27, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* 经典双列布局 */
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            transition: grid-template-columns .3s ease;
        }

        .layout.collapsed {
            grid-template-columns: 80px 1fr;
        }

        /* ---------- 侧边栏 (与 dashboard 完全一致) ---------- */
        .sidebar {
            background: linear-gradient(180deg, #3d1566, #631e97);
            padding: 24px 16px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .sidebar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 60%);
            pointer-events: none;
        }

        .toggle-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            margin-bottom: 4px;
        }

        .toggle {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .3s ease;
            position: relative;
        }

        .toggle span,
        .toggle span::before,
        .toggle span::after {
            display: block;
            width: 22px;
            height: 2px;
            background: white;
            transition: all .3s ease;
            position: absolute;
        }

        .toggle span {
            background: transparent;
        }

        .toggle span::before {
            content: "";
            top: 0;
            transform: rotate(45deg);
        }

        .toggle span::after {
            content: "";
            top: 0;
            transform: rotate(-45deg);
        }

        .layout.collapsed .toggle span {
            background: white;
        }

        .layout.collapsed .toggle span::before {
            top: -8px;
            transform: none;
        }

        .layout.collapsed .toggle span::after {
            top: 8px;
            transform: none;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .nav-group a,
        .nav-group button {
            border: none;
            background: transparent;
            color: white;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s, padding .2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
            text-decoration: none;
            font-weight: 400;
            font-family: inherit;
        }

        .nav-group a.active,
        .nav-group button.active,
        .nav-group a:hover,
        .nav-group button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        .nav-label {
            transition: opacity .3s ease;
            white-space: nowrap;
        }

        .layout.collapsed .nav-group a,
        .layout.collapsed .nav-group button {
            justify-content: center;
            padding: 12px;
        }

        .layout.collapsed .nav-label {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        /* ---------- 主内容区域 ---------- */
        .main {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .back-link {
            color: var(--deep);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(90, 43, 152, 0.08);
            transition: background 0.2s;
            font-size: 0.95rem;
            border: 1px solid rgba(90, 43, 152, 0.15);
        }

        .back-link:hover {
            background: rgba(90, 43, 152, 0.18);
        }

        .page-header h1 {
            font-weight: 600;
            font-size: 1.9rem;
            color: var(--text);
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* 卡片面板 */
        .content-panel {
            background: var(--panel);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(21, 16, 45, 0.12);
            padding: 32px 36px;
            border: 1px solid var(--border);
            max-width: 700px;
        }

        /* 表单样式 */
        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--deep);
            margin-bottom: 4px;
            border-left: 4px solid var(--deep);
            padding-left: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            gap: 16px;
        }

        .form-label {
            font-weight: 500;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-label i {
            color: var(--muted);
            margin-right: 6px;
            font-size: 1rem;
        }

        .form-control {
            padding: 12px 16px;
            border: 1.5px solid #d9d2e8;
            border-radius: 16px;
            font-size: 0.95rem;
            background: white;
            transition: border 0.2s, box-shadow 0.2s;
            font-family: inherit;
            width: 100%;
            max-width: 420px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--deep);
            box-shadow: 0 0 0 3px rgba(90, 43, 152, 0.1);
        }

        /* 占位文本样式 (灰色未填写) */
        .form-control.placeholder-shown {
            color: var(--muted);
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(156, 156, 178, 0.25);
            align-items: center;
            flex-wrap: wrap;
        }

        .form-status {
            width: 100%;
            min-height: 22px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .form-status.success {
            color: #167d68;
        }

        .form-status.error {
            color: #b02a37;
        }

        .btn-primary {
            background: var(--deep);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--deep);
        }

        .btn-primary:hover {
            background: #4a2380;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(90, 43, 152, 0.25);
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid var(--muted);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--deep);
            color: var(--deep);
            background: rgba(90, 43, 152, 0.03);
        }

        .password-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(28, 27, 51, 0.45);
            z-index: 20;
        }

        .password-modal.open {
            display: flex;
        }

        .password-dialog {
            width: min(440px, 100%);
            background: var(--panel);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 24px 80px rgba(21, 16, 45, 0.22);
            padding: 28px;
        }

        .password-dialog-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        .password-dialog-header h2 {
            margin: 0;
            color: var(--text);
            font-size: 1.35rem;
            font-weight: 600;
        }

        .icon-button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(90, 43, 152, 0.16);
            background: rgba(90, 43, 152, 0.06);
            color: var(--deep);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .password-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .password-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .password-field label {
            color: var(--text);
            font-weight: 500;
            font-size: 0.92rem;
        }

        .password-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        /* 退出登录按钮专用样式 (红色边框) */
        .btn-logout {
            background: transparent;
            border: 1.5px solid #dc3545;
            color: #dc3545;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .btn-logout:hover {
            background-color: rgba(220, 53, 69, 0.05);
            border-color: #b02a37;
            color: #b02a37;
        }

        /* 响应式 */
        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: relative;
                flex-direction: row;
                gap: 8px;
                padding: 12px;
            }
            .sidebar::after { display: none; }
            .layout.collapsed {
                grid-template-columns: 1fr;
            }
            .nav-group a,
            .nav-group button {
                justify-content: flex-start;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }
            .content-panel {
                padding: 24px;
            }
            .btn-logout {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 (高亮“个人设置”) -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="#" class="active">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <a href="student-dashboard.html" class="back-link">
                <i class="bi bi-arrow-left"></i> 返回工作台
            </a>
            <h1>⚙️ 个人设置</h1>
        </div>

        <div class="content-panel">
            <form class="settings-form" id="profileForm">
                <!-- 基本信息 -->
                <div class="form-section">
                    <div class="section-title">基本信息</div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-person"></i> 姓名(real name)</span>
                        <input type="text" class="form-control" id="fullName" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-upc-scan"></i> 学号</span>
                        <input type="text" class="form-control" id="studentNo" placeholder="未填写" disabled>
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-envelope"></i> 邮箱</span>
                        <input type="email" class="form-control" id="email" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-book"></i> 专业</span>
                        <input type="text" class="form-control" id="programme" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-calendar"></i> 入学日期</span>
                        <input type="date" class="form-control" id="enrollmentDate">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-phone"></i> 手机号</span>
                        <input type="tel" class="form-control" id="phone" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-heart"></i> 兴趣方向</span>
                        <input type="text" class="form-control" id="interests" placeholder="例如：机器学习、Web开发">
                    </div>
                </div>

                <!-- 操作按钮（包含退出登录） -->
                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="bi bi-check-lg"></i> 保存更改
                    </button>
                    <button type="button" class="btn-secondary" id="clearBtn">
                        <i class="bi bi-eraser"></i> 清空信息
                    </button>
                    <button type="button" class="btn-secondary" id="changePasswordBtn">
                        <i class="bi bi-key"></i> 修改密码
                    </button>
                    <button type="button" class="btn-logout" id="logoutBtn">
                        <i class="bi bi-box-arrow-right"></i> 退出登录
                    </button>
                    <span style="flex:1; text-align:right; font-size:0.8rem; color:var(--muted);">
                        <i class="bi bi-shield-check"></i> 信息加密传输
                    </span>
                    <div class="form-status" id="profileStatus" aria-live="polite"></div>
                </div>
            </form>
        </div>
    </main>
</div>

<div class="password-modal" id="passwordModal" aria-hidden="true">
    <div class="password-dialog" role="dialog" aria-modal="true" aria-labelledby="passwordModalTitle">
        <div class="password-dialog-header">
            <h2 id="passwordModalTitle">修改密码</h2>
            <button type="button" class="icon-button" id="closePasswordModalBtn" aria-label="关闭修改密码窗口">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <form class="password-form" id="passwordForm">
            <div class="password-field">
                <label for="oldPassword">旧密码</label>
                <input type="password" class="form-control" id="oldPassword" autocomplete="current-password" placeholder="请输入当前密码">
            </div>
            <div class="password-field">
                <label for="newPassword">新密码</label>
                <input type="password" class="form-control" id="newPassword" autocomplete="new-password" placeholder="请输入新密码">
            </div>
            <div class="password-field">
                <label for="confirmPassword">确认新密码</label>
                <input type="password" class="form-control" id="confirmPassword" autocomplete="new-password" placeholder="请再次输入新密码">
            </div>
            <div class="form-status" id="passwordStatus" aria-live="polite"></div>
            <div class="password-actions">
                <button type="button" class="btn-secondary" id="cancelPasswordBtn">取消</button>
                <button type="submit" class="btn-primary">
                    <i class="bi bi-check-lg"></i> 确认修改
                </button>
            </div>
        </form>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";

        const user = ApiClient.requireAuth("STUDENT");
        if (!user) {
            return;
        }

        const API_BASE = "/api/student/profile/me";

        const profileForm = document.getElementById('profileForm');
        const clearBtn = document.getElementById('clearBtn');
        const changePasswordBtn = document.getElementById('changePasswordBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const profileStatus = document.getElementById('profileStatus');
        const passwordModal = document.getElementById('passwordModal');
        const passwordForm = document.getElementById('passwordForm');
        const oldPassword = document.getElementById('oldPassword');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const passwordStatus = document.getElementById('passwordStatus');
        const closePasswordModalBtn = document.getElementById('closePasswordModalBtn');
        const cancelPasswordBtn = document.getElementById('cancelPasswordBtn');

        const inputs = {
            fullName: document.getElementById('fullName'),
            studentNo: document.getElementById('studentNo'),
            email: document.getElementById('email'),
            programme: document.getElementById('programme'),
            enrollmentDate: document.getElementById('enrollmentDate'),
            phone: document.getElementById('phone'),
            interests: document.getElementById('interests')
        };

        function setStatus(message, type) {
            profileStatus.textContent = message || "";
            profileStatus.className = type ? `form-status ${type}` : "form-status";
        }

        function setPasswordStatus(message, type) {
            passwordStatus.textContent = message || "";
            passwordStatus.className = type ? `form-status ${type}` : "form-status";
        }

        //打开密码弹窗*******
        function openPasswordModal() {
            passwordModal.classList.add("open");//css要求改动
            passwordModal.setAttribute("aria-hidden", "false");
            passwordForm.reset();
            setPasswordStatus("", "");
            oldPassword.focus();
        }

        function closePasswordModal() {
            passwordModal.classList.remove("open");
            passwordModal.setAttribute("aria-hidden", "true");
            passwordForm.reset();
            setPasswordStatus("", "");
        }

        function formatDateForInput(value) {
            if (!value) return "";
            return String(value).split("T")[0];
        }

        function fillProfile(profile) {
            inputs.fullName.value = profile.fullName || "";
            inputs.studentNo.value = profile.studentNo || "";
            inputs.email.value = profile.email || "";
            inputs.programme.value = profile.programme || "";
            inputs.enrollmentDate.value = formatDateForInput(profile.enrollmentDate);
            inputs.phone.value = profile.phone || "";
            inputs.interests.value = profile.interests || "";
        }

        //后端加载当前学生信息
        async function fetchProfile() {
            setStatus("正在加载个人资料...", "");//提示
            try {
                const profile = await ApiClient.get(API_BASE);//向后端发送 GET 请求，获取当前学生的个人资料。
                fillProfile(profile || {});

                if (profile?.fullName) {
                    localStorage.setItem("fullName", profile.fullName);
                }
                setStatus("个人资料已同步。", "success");
            } catch (err) {
                console.error(err);
                setStatus(err.message || "个人资料加载失败，请稍后重试。", "error");
            }
        }
        fetchProfile();

        //清空信息按钮
        clearBtn.addEventListener('click', () => {
            inputs.fullName.value = '';
            inputs.email.value = '';
            inputs.programme.value = '';
            inputs.enrollmentDate.value = '';
            inputs.phone.value = '';
            inputs.interests.value = '';
            setStatus("已清空可编辑字段，保存后才会提交到后端。", "");
            //注意这里没有清空 studentNo，因为学号一般是不可编辑字段
        });
        //绑定按钮
        changePasswordBtn.addEventListener('click', openPasswordModal);
        closePasswordModalBtn.addEventListener('click', closePasswordModal);
        cancelPasswordBtn.addEventListener('click', closePasswordModal);
        passwordModal.addEventListener('click', (event) => {
            if (event.target === passwordModal) {
                closePasswordModal();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === "Escape" && passwordModal.classList.contains("open")) {
                closePasswordModal();
            }
        });

        passwordForm.addEventListener('submit', async (event) => {
            event.preventDefault();//ness
            const oldPasswordValue = oldPassword.value.trim();
            const passwordValue = newPassword.value.trim();
            const confirmValue = confirmPassword.value.trim();
            if (!oldPasswordValue) {
                setPasswordStatus("请输入旧密码。", "error");
                oldPassword.focus();
                return;
            }
            if (!passwordValue) {
                setPasswordStatus("请输入新密码。", "error");
                newPassword.focus();
                return;
            }
            if (!confirmValue) {
                setPasswordStatus("请再次输入新密码。", "error");
                confirmPassword.focus();
                return;
            }
            if (passwordValue !== confirmValue) {
                setPasswordStatus("两次输入的密码不一致。", "error");
                confirmPassword.focus();
                return;
            }

            const submitBtn = passwordForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 修改中...';
            setPasswordStatus("正在提交密码修改...", "");

            try {
                await ApiClient.put(`${API_BASE}/password`, {
                    oldPassword: oldPasswordValue,
                    newPassword: passwordValue
                });
                setPasswordStatus("密码修改成功。", "success");
                setStatus("密码修改成功。", "success");
                setTimeout(closePasswordModal, 700);
            } catch (err) {
                console.error(err);
                setPasswordStatus(err.message || "密码修改失败，请稍后重试。", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        //表单提交
        profileForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullNameVal = inputs.fullName.value.trim();
            if (!fullNameVal) {
                setStatus("姓名不能为空，请填写。", "error");
                inputs.fullName.focus();
                return;
            }

            //邮箱非空校验
            const emailVal = inputs.email.value.trim();
            if (!emailVal) {
                setStatus("邮箱不能为空，请填写。", "error");
                inputs.email.focus();
                return;
            }

            //邮箱格式校验
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(emailVal)) {
                setStatus("邮箱格式不正确，请检查后重新输入。", "error");
                inputs.email.focus();
                return;
            }

            const saveBtn = profileForm.querySelector('button[type="submit"]');
            const originalText = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 保存中...';
            setStatus("正在保存个人资料...", "");

            // 构建请求体
            const payload = {
                fullName: fullNameVal,
                email: emailVal,
                programme: inputs.programme.value.trim(),
                enrollmentDate: inputs.enrollmentDate.value || null,
                phone: inputs.phone.value.trim(),
                interests: inputs.interests.value.trim()
            };

            try {
                await ApiClient.put(API_BASE, payload);
                localStorage.setItem("fullName", payload.fullName);
                localStorage.setItem("username", localStorage.getItem("username") || user.username || "");
                setStatus("个人设置已保存。", "success");
            } catch (err) {
                console.error(err);
                setStatus(err.message || "保存失败，请稍后重试。", "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        });

        //退出登录
        function handleLogout() {
            ApiClient.logout();
        }
        logoutBtn.addEventListener('click', handleLogout);

        //侧边栏折叠
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

        const style = document.createElement('style');
        style.textContent = `
            .form-control::placeholder {
                color: var(--muted);
                opacity: 0.7;
            }
        `;
        document.head.appendChild(style);
    })();
</script>
</body>
</html>
