<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>个人设置 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 (高亮“个人设置”) -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <button>
                <i class="bi bi-person-badge nav-icon"></i>
                <span class="nav-label">热门导师</span>
            </button>
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="#" class="active">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <a href="student-dashboard.html" class="back-link">
                <i class="bi bi-arrow-left"></i> 返回工作台
            </a>
            <h1>⚙️ 个人设置</h1>
        </div>

        <div class="content-panel">
            <form class="settings-form" id="profileForm">
                <!-- 基本信息 -->
                <div class="form-section">
                    <div class="section-title">基本信息</div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-person"></i> 姓名</span>
                        <input type="text" class="form-control" id="studentName" value="张三" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-upc-scan"></i> 学号</span>
                        <input type="text" class="form-control" id="studentId" value="2024001234" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-building"></i> 学院</span>
                        <input type="text" class="form-control" id="college" value="计算机科学与技术学院" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-envelope"></i> 邮箱</span>
                        <input type="email" class="form-control" id="email" value="zhangsan@stu.university.edu" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-phone"></i> 手机号</span>
                        <input type="tel" class="form-control" id="phone" value="18812345678" placeholder="未填写">
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="bi bi-check-lg"></i> 保存更改
                    </button>
                    <button type="button" class="btn-secondary" id="clearBtn">
                        <i class="bi bi-eraser"></i> 清空信息
                    </button>
                    <span style="flex:1; text-align:right; font-size:0.8rem; color:var(--muted);">
                        <i class="bi bi-shield-check"></i> 信息加密传输
                    </span>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    (function() {
        "use strict";

        const profileForm = document.getElementById('profileForm');
        const clearBtn = document.getElementById('clearBtn');
        
        // 获取所有输入框
        const inputs = {
            studentName: document.getElementById('studentName'),
            studentId: document.getElementById('studentId'),
            college: document.getElementById('college'),
            email: document.getElementById('email'),
            phone: document.getElementById('phone')
        };

        // 为每个输入框添加事件：当用户开始输入时，如果当前值是空或只有占位符视觉效果，不做特殊处理（placeholder已处理）
        // 但我们需要确保清空后显示灰色“未填写”，这是通过设置value为空并依靠placeholder实现。
        // 同时，当输入框获得焦点或输入时，placeholder自动消失（浏览器默认行为）。

        // 清空信息按钮：将所有输入框的值清空，placeholder会自动显示“未填写”
        clearBtn.addEventListener('click', () => {
            for (let key in inputs) {
                if (inputs[key]) {
                    inputs[key].value = '';
                }
            }
        });

        // 表单提交 (保存更改)
        profileForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = {
                name: inputs.studentName.value,
                studentId: inputs.studentId.value,
                college: inputs.college.value,
                email: inputs.email.value,
                phone: inputs.phone.value
            };
            console.log('保存设置:', formData);
            alert('✅ 个人设置已保存 (演示模式)');
        });

        // 侧边栏折叠
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

        // 可选：如果希望清空后样式上更明显，可以添加类，但依靠placeholder足够了。
        // 另外，确保输入框的placeholder颜色为灰色（通过CSS变量--muted）
        // 添加全局样式调整placeholder颜色
        const style = document.createElement('style');
        style.textContent = `
            .form-control::placeholder {
                color: var(--muted);
                opacity: 0.7;
            }
        `;
        document.head.appendChild(style);
    })();
</script>
</body>
</html>
