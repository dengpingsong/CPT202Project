<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>个人设置 · 学生选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        /* ----- 全局变量 & 基础样式 (完全沿用 dashboard 设计语言) ----- */
        :root {
            --bg: #f4f3f7;
            --deep: #5a2b98;
            --mid: #7b4fbd;
            --panel: #ffffff;
            --text: #1c1b33;
            --muted: #6b6b82;
            --accent: #24b3ff;
            --orange: #f6a63d;
            --green: #2fc5a8;
            --border: rgba(28, 27, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* 经典双列布局 */
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            transition: grid-template-columns .3s ease;
        }

        .layout.collapsed {
            grid-template-columns: 80px 1fr;
        }

        /* ---------- 侧边栏 (与 dashboard 完全一致) ---------- */
        .sidebar {
            background: linear-gradient(180deg, #3d1566, #631e97);
            padding: 24px 16px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .sidebar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 60%);
            pointer-events: none;
        }

        .toggle-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            margin-bottom: 4px;
        }

        .toggle {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .3s ease;
            position: relative;
        }

        .toggle span,
        .toggle span::before,
        .toggle span::after {
            display: block;
            width: 22px;
            height: 2px;
            background: white;
            transition: all .3s ease;
            position: absolute;
        }

        .toggle span {
            background: transparent;
        }

        .toggle span::before {
            content: "";
            top: 0;
            transform: rotate(45deg);
        }

        .toggle span::after {
            content: "";
            top: 0;
            transform: rotate(-45deg);
        }

        .layout.collapsed .toggle span {
            background: white;
        }

        .layout.collapsed .toggle span::before {
            top: -8px;
            transform: none;
        }

        .layout.collapsed .toggle span::after {
            top: 8px;
            transform: none;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .nav-group a,
        .nav-group button {
            border: none;
            background: transparent;
            color: white;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s, padding .2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
            text-decoration: none;
            font-weight: 400;
            font-family: inherit;
        }

        .nav-group a.active,
        .nav-group button.active,
        .nav-group a:hover,
        .nav-group button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        .nav-label {
            transition: opacity .3s ease;
            white-space: nowrap;
        }

        .layout.collapsed .nav-group a,
        .layout.collapsed .nav-group button {
            justify-content: center;
            padding: 12px;
        }

        .layout.collapsed .nav-label {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        /* ---------- 主内容区域 ---------- */
        .main {
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .back-link {
            color: var(--deep);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(90, 43, 152, 0.08);
            transition: background 0.2s;
            font-size: 0.95rem;
            border: 1px solid rgba(90, 43, 152, 0.15);
        }

        .back-link:hover {
            background: rgba(90, 43, 152, 0.18);
        }

        .page-header h1 {
            font-weight: 600;
            font-size: 1.9rem;
            color: var(--text);
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* 卡片面板 */
        .content-panel {
            background: var(--panel);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(21, 16, 45, 0.12);
            padding: 32px 36px;
            border: 1px solid var(--border);
            max-width: 700px;
        }

        /* 表单样式 */
        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--deep);
            margin-bottom: 4px;
            border-left: 4px solid var(--deep);
            padding-left: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            gap: 16px;
        }

        .form-label {
            font-weight: 500;
            color: var(--text);
            font-size: 0.95rem;
        }

        .form-label i {
            color: var(--muted);
            margin-right: 6px;
            font-size: 1rem;
        }

        .form-control {
            padding: 12px 16px;
            border: 1.5px solid #d9d2e8;
            border-radius: 16px;
            font-size: 0.95rem;
            background: white;
            transition: border 0.2s, box-shadow 0.2s;
            font-family: inherit;
            width: 100%;
            max-width: 420px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--deep);
            box-shadow: 0 0 0 3px rgba(90, 43, 152, 0.1);
        }

        /* 占位文本样式 (灰色未填写) */
        .form-control.placeholder-shown {
            color: var(--muted);
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(156, 156, 178, 0.25);
        }

        .btn-primary {
            background: var(--deep);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--deep);
        }

        .btn-primary:hover {
            background: #4a2380;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(90, 43, 152, 0.25);
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid var(--muted);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--deep);
            color: var(--deep);
            background: rgba(90, 43, 152, 0.03);
        }

        /* 响应式 */
        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: relative;
                flex-direction: row;
                gap: 8px;
                padding: 12px;
            }
            .sidebar::after { display: none; }
            .layout.collapsed {
                grid-template-columns: 1fr;
            }
            .nav-group a,
            .nav-group button {
                justify-content: flex-start;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }
            .content-panel {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 (高亮“个人设置”) -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <button>
                <i class="bi bi-person-badge nav-icon"></i>
                <span class="nav-label">热门导师</span>
            </button>
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="#" class="active">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <a href="student-dashboard.html" class="back-link">
                <i class="bi bi-arrow-left"></i> 返回工作台
            </a>
            <h1>⚙️ 个人设置</h1>
        </div>

        <div class="content-panel">
            <form class="settings-form" id="profileForm">
                <!-- 基本信息 -->
                <div class="form-section">
                    <div class="section-title">基本信息</div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-person"></i> 姓名</span>
                        <input type="text" class="form-control" id="studentName" value="张三" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-upc-scan"></i> 学号</span>
                        <input type="text" class="form-control" id="studentId" value="2024001234" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-building"></i> 学院</span>
                        <input type="text" class="form-control" id="college" value="计算机科学与技术学院" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-envelope"></i> 邮箱</span>
                        <input type="email" class="form-control" id="email" value="zhangsan@stu.university.edu" placeholder="未填写">
                    </div>
                    <div class="form-row">
                        <span class="form-label"><i class="bi bi-phone"></i> 手机号</span>
                        <input type="tel" class="form-control" id="phone" value="18812345678" placeholder="未填写">
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="bi bi-check-lg"></i> 保存更改
                    </button>
                    <button type="button" class="btn-secondary" id="clearBtn">
                        <i class="bi bi-eraser"></i> 清空信息
                    </button>
                    <span style="flex:1; text-align:right; font-size:0.8rem; color:var(--muted);">
                        <i class="bi bi-shield-check"></i> 信息加密传输
                    </span>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    (function() {
        "use strict";

        const profileForm = document.getElementById('profileForm');
        const clearBtn = document.getElementById('clearBtn');
        
        // 获取所有输入框
        const inputs = {
            studentName: document.getElementById('studentName'),
            studentId: document.getElementById('studentId'),
            college: document.getElementById('college'),
            email: document.getElementById('email'),
            phone: document.getElementById('phone')
        };

        // 为每个输入框添加事件：当用户开始输入时，如果当前值是空或只有占位符视觉效果，不做特殊处理（placeholder已处理）
        // 但我们需要确保清空后显示灰色“未填写”，这是通过设置value为空并依靠placeholder实现。
        // 同时，当输入框获得焦点或输入时，placeholder自动消失（浏览器默认行为）。

        // 清空信息按钮：将所有输入框的值清空，placeholder会自动显示“未填写”
        clearBtn.addEventListener('click', () => {
            for (let key in inputs) {
                if (inputs[key]) {
                    inputs[key].value = '';
                }
            }
        });

        // 表单提交 (保存更改)
        profileForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = {
                name: inputs.studentName.value,
                studentId: inputs.studentId.value,
                college: inputs.college.value,
                email: inputs.email.value,
                phone: inputs.phone.value
            };
            console.log('保存设置:', formData);
            alert('✅ 个人设置已保存 (演示模式)');
        });

        // 侧边栏折叠
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

        // 可选：如果希望清空后样式上更明显，可以添加类，但依靠placeholder足够了。
        // 另外，确保输入框的placeholder颜色为灰色（通过CSS变量--muted）
        // 添加全局样式调整placeholder颜色
        const style = document.createElement('style');
        style.textContent = `
            .form-control::placeholder {
                color: var(--muted);
                opacity: 0.7;
            }
        `;
        document.head.appendChild(style);
    })();
</script>
</body>
</html>
