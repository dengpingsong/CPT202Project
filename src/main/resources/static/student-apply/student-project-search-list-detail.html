<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>项目详情</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar"><span></span></button>
        </div>
        <div class="nav-group">
            <a href="student-dashboard.html"><i class="bi bi-kanban nav-icon"></i><span class="nav-label">申请状态</span></a>
            <a href="student-project-search-list.html" class="active"><i class="bi bi-search nav-icon"></i><span class="nav-label">搜索项目</span></a>
            <a href="student-request-history.html"><i class="bi bi-clock-history nav-icon"></i><span class="nav-label">请求历史</span></a>
            <a href="student-notification.html"><i class="bi bi-chat-dots nav-icon"></i><span class="nav-label">消息/通知</span></a>
            <a href="student-profile.html"><i class="bi bi-person-gear nav-icon"></i><span class="nav-label">个人设置</span></a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <a href="student-project-search-list.html" class="back-link">← 返回项目列表</a>
            <h1>项目详情</h1>
        </div>

        <div class="panel-card" id="detailPanel">
            <div style="text-align:center; padding:40px; color:var(--muted);">加载中...</div>
        </div>
    </main>
</div>

<script>
    (function () {
        const detailPanel = document.getElementById("detailPanel");
        const params = new URLSearchParams(window.location.search);
        const projectId = params.get("projectId");
        const code = params.get("code"); // 兼容旧链接

        function esc(v) {
            if (v === null || v === undefined) return "";
            return String(v)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function statusText(status) {
            const map = {
                AVAILABLE: "Available",
                REQUESTED: "Requested",
                AGREED: "Agreed",
                CLOSED: "Closed",
                ARCHIVED: "Archived"
            };
            return map[status] || status || "UNKNOWN";
        }

        function fmtDate(v) {
            if (!v) return "-";
            try {
                return new Date(v).toLocaleString();
            } catch {
                return v;
            }
        }

        function renderProject(p) {
            const current = Number(p.currentAgreedCount || 0);
            const max = Number(p.maxStudents || 0);
            const surfCode = `SURF-${p.projectId}`;

            document.title = `${p.title} | 项目详情`;

            detailPanel.innerHTML = `
            <div class="detail-header">
                <h2>${esc(p.title)}</h2>
                <span class="surf-badge">${esc(surfCode)}</span>
            </div>

            <div class="meta-grid">
                <div class="meta-item"><span class="meta-label">Project ID</span><span class="meta-value">${esc(p.projectId)}</span></div>
                <div class="meta-item"><span class="meta-label">Teacher</span><span class="meta-value">${esc(p.teacherName || "-")}</span></div>
                <div class="meta-item"><span class="meta-label">Category</span><span class="meta-value">${esc(p.categoryName || "-")}</span></div>
                <div class="meta-item"><span class="meta-label">Topic Area</span><span class="meta-value">${esc(p.topicArea || "-")}</span></div>
                <div class="meta-item"><span class="meta-label">Required Skills</span><span class="meta-value">${esc(p.requiredSkills || "-")}</span></div>
                <div class="meta-item"><span class="meta-label">Quota</span><span class="meta-value">${current}/${max}</span></div>
                <div class="meta-item"><span class="meta-label">Status</span><span class="meta-value">${esc(statusText(p.projectStatus))}</span></div>
                <div class="meta-item"><span class="meta-label">Publish Date</span><span class="meta-value">${esc(fmtDate(p.publishDate))}</span></div>
            </div>

            <div class="detail-block">
                <h3>Description</h3>
                <div class="detail-text">${esc(p.description || "-")}</div>
            </div>

            <div class="action-buttons">
                <button class="btn-primary" id="applyBtn">申请该项目</button>
                <button class="btn-secondary" onclick="window.location.href='student-project-search-list.html'">返回列表</button>
            </div>
        `;

            const applyBtn = document.getElementById("applyBtn");
            if (applyBtn) {
                applyBtn.addEventListener("click", () => {
                    alert("下一步可接入申请接口：POST /api/student/requests");
                });
            }
        }

        async function loadById(id) {
            const token = localStorage.getItem("token") || "";
            const headers = token ? { "Authorization": `Bearer ${token}` } : {};

            const res = await fetch(`/api/student/projects/${encodeURIComponent(id)}`, {
                method: "GET",
                headers
            });
            const result = await res.json();
            if (!res.ok || result.code !== 1 || !result.data) {
                throw new Error(result.msg || "项目不存在");
            }
            return result.data;
        }

        async function loadByCodeFallback(codeValue) {
            // 兼容旧的 code= SURF-xxx 链接
            const id = (codeValue || "").replace("SURF-", "").trim();
            if (!id) throw new Error("缺少项目ID");
            return loadById(id);
        }

        async function init() {
            try {
                let project;
                if (projectId) {
                    project = await loadById(projectId);
                } else if (code) {
                    project = await loadByCodeFallback(code);
                } else {
                    throw new Error("链接缺少 projectId 参数");
                }
                renderProject(project);
            } catch (e) {
                console.error(e);
                detailPanel.innerHTML = `
                <div style="text-align:center; padding:40px;">
                    加载失败：${esc(e.message || "未知错误")}<br/>
                    <a href="student-project-search-list.html">返回列表</a>
                </div>`;
            }
        }

        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });

        init();
    })();
</script>
</body>
</html>
