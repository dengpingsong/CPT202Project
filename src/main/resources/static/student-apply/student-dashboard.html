<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>Student Workspace · 大学课题选题系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/studentsp.css" />
</head>
<body>
<div class="layout" id="layout">
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <!-- 申请状态：当前页面，不跳转，高亮 -->
            <a href="#" class="active" style="pointer-events: none; cursor: default;">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">申请状态</span>
            </a>
            <!-- 搜索项目：跳转到项目列表页 -->
            <a href="student-project-search-list.html">
                <i class="bi bi-search nav-icon"></i>
                <span class="nav-label">搜索项目</span>
            </a>
            <!-- 请求历史 -->
            <a href="student-request-history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">请求历史</span>
            </a>
            <!-- 消息/通知 -->
            <a href="student-notification.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <!-- 个人设置 -->
            <a href="student-profile.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <section class="hero">
            <div>
                <h1 id="welcomeTitle">欢迎</h1>
                <p class="hero-info">
                    这是你的学生选题工作台。你可以查看当前申请、搜索指导教师发布的项目，或者查看以往的请求记录。
                </p>
                <span class="badge" id="activeRequestBadge">当前活跃申请：加载中</span>
            </div>
            <button class="cta" id="quickApplyBtn" type="button">
                快速申请推荐项目
                <small>优先推荐适合你技能的课题</small>
            </button>
        </section>

        <section class="stats">
            <div class="panel">
                <h3>当前状态</h3>
                <strong id="currentStatus">加载中</strong>
                <p class="rule" id="currentStatusRule">正在读取你的申请状态</p>
            </div>
            <div class="panel">
                <h3>已获同意项目</h3>
                <strong id="acceptedCount">0</strong>
                <p class="rule">若已有 Accepted，会自动禁用申请按钮</p>
            </div>
            <div class="panel">
                <h3>本学期申请次数</h3>
                <strong id="requestCount">0</strong>
                <p class="rule" id="requestCountRule">申请记录正在同步</p>
            </div>
        </section>

        <section>
            <h2 style="margin-top: 0;">推荐项目</h2>
            <div class="grid" id="recommendedProjects">
                <article class="card">
                    <h4>正在加载推荐项目</h4>
                    <p class="meta">请稍候</p>
                </article>
            </div>
        </section>

        <section class="timeline">
            <h3>近期申请记录</h3>
            <div id="recentRequests">
                <div class="item">
                    <div style="display: flex; flex-direction: column;">
                        <strong style="margin-bottom: 6px;">正在加载申请记录</strong>
                        <p class="meta" style="margin-top: 8px;">请稍候</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function () {
        "use strict";
        //get html
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        const welcomeTitle = document.getElementById("welcomeTitle");
        const activeRequestBadge = document.getElementById("activeRequestBadge");
        const currentStatus = document.getElementById("currentStatus");
        const currentStatusRule = document.getElementById("currentStatusRule");
        const acceptedCount = document.getElementById("acceptedCount");
        const requestCount = document.getElementById("requestCount");
        const requestCountRule = document.getElementById("requestCountRule");
        const recommendedProjects = document.getElementById("recommendedProjects");
        const recentRequests = document.getElementById("recentRequests");
        const quickApplyBtn = document.getElementById("quickApplyBtn");
        //sidebar
        let isCollapsed = false;
        toggle.addEventListener("click", () => {
            isCollapsed = !isCollapsed;
            layout.classList.toggle("collapsed", isCollapsed);
        });
        //apply
        quickApplyBtn.addEventListener("click", () => {
            window.location.href = "student-project-search-list.html";
        });

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
        //status toUpperCase ***我们系统都统一大写
        function normalizeStatus(status) {
            return String(status || "UNKNOWN").toUpperCase();
        }
        //css 样式
        function statusClass(status) {
            const normalized = normalizeStatus(status);
            if (normalized === "AVAILABLE") return "status-available";
            if (normalized === "PENDING" || normalized === "REQUESTED") return "status-requested";
            if (normalized === "ACCEPTED" || normalized === "AGREED") return "status-agreed";
            return "status-unavailable";
        }
        //日期格式化
        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).slice(0, 10);
            return date.toLocaleDateString("zh-CN", {
                month: "2-digit",
                day: "2-digit"
            });
        }

        async function withdrawRequest(requestId) {
            if (!requestId) return;
            if (!window.confirm("确认撤回这条申请吗？")) return;

            try {
                await ApiClient.student.withdrawRequest(requestId);
                await initDashboard();
            } catch (error) {
                window.alert(error.message || "撤回失败，请稍后重试。");
            }
        }
        //main context update
        function renderStats(requests) {
            const user = ApiClient.getCurrentUser();
            const displayName = user.fullName || user.username || "同学";
            const pending = requests.filter(item => normalizeStatus(item.requestStatus) === "PENDING").length;
            const accepted = requests.filter(item => normalizeStatus(item.requestStatus) === "ACCEPTED").length;
            const active = pending + accepted;

            welcomeTitle.textContent = `欢迎，${displayName}`;
            activeRequestBadge.textContent = `当前活跃申请：${active} 个`;
            acceptedCount.textContent = String(accepted);
            requestCount.textContent = String(requests.length);

            if (accepted > 0) {
                currentStatus.textContent = "Accepted";
                currentStatusRule.textContent = `已有 ${accepted} 个通过申请，新的申请可能会受到限制`;
                requestCountRule.textContent = "你已经有通过的项目，请优先确认后续安排";
                return;
            }

            if (pending > 0) {
                currentStatus.textContent = "Pending";
                currentStatusRule.textContent = `已有 ${pending} 个待审批项目`;
                requestCountRule.textContent = "可继续查看项目详情，避免重复申请同一项目";
                return;
            }

            currentStatus.textContent = "No Active Request";
            currentStatusRule.textContent = "当前没有待审批或已通过的申请";
            requestCountRule.textContent = "可以从推荐项目或搜索项目开始申请";
        }
        //推荐项目
        function renderProjects(projectPage, requests) {//后端返回的项目列表数据
            const projects = Array.isArray(projectPage?.records) ? projectPage.records.slice(0, 3) : [];
            const requestedProjectIds = new Set(
                requests
                    .filter(item => ["PENDING", "ACCEPTED"].includes(normalizeStatus(item.requestStatus)))
                    .map(item => String(item.projectId))
            );

            if (projects.length === 0) {
                recommendedProjects.innerHTML = `
                    <article class="card">
                        <h4>暂无可推荐项目</h4>
                        <p class="meta">当前没有可展示的项目，请稍后再试</p>
                        <button class="secondary" type="button" onclick="window.location.href='student-project-search-list.html'">查看项目列表</button>
                    </article>
                `;
                return;
            }

            recommendedProjects.innerHTML = projects.map(project => {
                const projectId = project.projectId;
                const current = Number(project.currentAgreedCount || 0);
                const max = Number(project.maxStudents || 0);
                const hasRequested = requestedProjectIds.has(String(projectId));
                const status = hasRequested ? "REQUESTED" : project.projectStatus;
                const buttonText = hasRequested ? "查看申请" : "查看详情";
                const buttonClass = hasRequested ? "" : "secondary";

                return `
                    <article class="card">
                        <span class="status-pill ${statusClass(status)}">${esc(status)}</span>
                        <h4>${esc(project.title || "未命名项目")}</h4>
                        <p class="meta">分类：${esc(project.categoryName || "-")} | 名额：${current}/${max}</p>
                        <p class="meta">指导教师：${esc(project.teacherName || "-")} | 方向：${esc(project.topicArea || "-")}</p>
                        <button class="${buttonClass}" type="button" onclick="window.location.href='student-project-search-list-detail.html?projectId=${encodeURIComponent(projectId)}&from=dashboard'">${buttonText}</button>
                    </article>
                `;
            }).join("");//遍历项目生成多张卡片 HTML，然后把它们拼成一个完整 HTML 字符串。
        }

        function renderRecentRequests(requests) {
            const latest = requests.slice(0, 3);

            if (latest.length === 0) {
                recentRequests.innerHTML = `
                    <div class="item">
                        <div style="display: flex; flex-direction: column;">
                            <strong style="margin-bottom: 6px;">暂无申请记录</strong>
                            <p class="meta" style="margin-top: 8px;">你提交申请后会显示在这里</p>
                        </div>
                    </div>
                `;
                return;
            }

            recentRequests.innerHTML = latest.map(item => `
                <div class="item">
                    <div style="display: flex; flex-direction: column;">
                        <strong style="margin-bottom: 6px;">${esc(item.projectTitle || "未命名项目")}</strong>
                        <div style="display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.85rem; color: var(--muted);">
                            <span>申请时间：${esc(formatDate(item.submittedAt))}</span>
                            <span>最后更新：${esc(formatDate(item.reviewedAt || item.withdrawnAt || item.submittedAt))}</span>
                            <span>志愿顺位：${esc(item.preferenceRank || "-")}</span>
                        </div>
                        <p class="meta" style="margin-top: 8px;">备注：${esc(item.notes || "-")}</p>
                        ${item.decisionComment ? `<p class="meta" style="margin-top: 4px;">反馈：${esc(item.decisionComment)}</p>` : ""}
                        ${normalizeStatus(item.requestStatus) === "PENDING" ? `
                            <div style="margin-top: 10px;">
                                <button type="button" class="secondary withdraw-btn" data-request-id="${esc(item.requestId)}">撤回申请</button>
                            </div>
                        ` : ""}
                    </div>
                    <span class="status ${statusClass(item.requestStatus)}" style="align-self: center;">${esc(normalizeStatus(item.requestStatus))}</span>
                </div>
            `).join("");

            document.querySelectorAll(".withdraw-btn").forEach(button => {
                button.addEventListener("click", () => {
                    withdrawRequest(button.getAttribute("data-request-id"));
                });
            });
        }

        async function initDashboard() {
            try {
                const user = ApiClient.requireAuth("STUDENT");
                if (!user) return;

                const [requests, projectPage] = await Promise.all([
                    ApiClient.get("/api/student/requests"),//获取当前学生的申请记录
                    ApiClient.get("/api/student/projects?pageNum=1&pageSize=3")//获取推荐项目列表
                ]);

                const safeRequests = Array.isArray(requests) ? requests : [];
                renderStats(safeRequests);
                renderProjects(projectPage, safeRequests);
                renderRecentRequests(safeRequests);
            } catch (error) {
                console.error(error);
                activeRequestBadge.textContent = "当前活跃申请：加载失败";
                currentStatus.textContent = "Load Failed";
                currentStatusRule.textContent = error.message || "读取申请状态失败";
                recommendedProjects.innerHTML = `
                    <article class="card">
                        <h4>推荐项目加载失败</h4>
                        <p class="meta">${esc(error.message || "请稍后重试")}</p>
                    </article>
                `;
                recentRequests.innerHTML = `
                    <div class="item">
                        <div style="display: flex; flex-direction: column;">
                            <strong style="margin-bottom: 6px;">申请记录加载失败</strong>
                            <p class="meta" style="margin-top: 8px;">${esc(error.message || "请稍后重试")}</p>
                        </div>
                    </div>
                `;
            }
        }

        initDashboard();
    })();
</script>
</body>
</html>
