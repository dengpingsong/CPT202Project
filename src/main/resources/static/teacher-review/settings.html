<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 个人设置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息通知</span>
            </a>
            <a href="settings.html" class="active">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>



    <main class="main">
        <header class="page-header">
            <h1>个人偏好与设置</h1>
        </header>

        <div class="panel" style="max-width: 600px;">
            <form id="settingsForm">
                <div class="mb-3">
                    <label class="form-label">姓名(real name)</label>
                    <input type="text" class="form-control" id="fullName" value="" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">教工邮箱</label>
                    <input type="email" class="form-control" id="email" value="" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">所属系/学院</label>
                    <input type="text" class="form-control" id="department" value="">
                </div>
                <div class="mb-4">
                    <label class="form-label">职称</label>
                    <input type="text" class="form-control" id="title" value="">
                </div>
                <div class="mb-4">
                    <label class="form-label">研究方向</label>
                    <input type="text" class="form-control" id="researchArea" value="">
                </div>
                <div class="mb-4">
                    <label class="form-label">办公地点</label>
                    <input type="text" class="form-control" id="office" value="">
                </div>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-4" style="border-radius:20px; background-color:#35b8e0; border:none;" id="saveBtn">保存修改</button>
                    <button type="button" class="btn btn-secondary px-4" style="border-radius:20px;" id="changePasswordBtn">修改密码</button>
                    <button type="button" class="btn btn-outline-danger px-4" style="border-radius:20px;" id="logoutBtn">退出登录</button>
                </div>
                <div id="settingsStatus" class="footnote" style="text-align:left; margin-top:16px;">正在加载个人资料...</div>
            </form>
        </div>
    </main>
</div>

<div id="passwordModal" aria-hidden="true" style="display:none; position:fixed; inset:0; background:rgba(28,20,43,0.45); z-index:1000; align-items:center; justify-content:center; padding:20px;">
    <div role="dialog" aria-modal="true" aria-labelledby="passwordModalTitle" style="width:min(460px, 100%); background:#fff; border-radius:16px; padding:24px; box-shadow:0 24px 60px rgba(28,20,43,0.22);">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
            <h2 id="passwordModalTitle" style="font-size:1.25rem; margin:0; flex:1;">修改密码</h2>
            <button type="button" class="btn-secondary" id="closePasswordModalBtn" style="padding:6px 12px;">关闭</button>
        </div>
        <form id="passwordForm">
            <div class="mb-3">
                <label class="form-label">当前密码</label>
                <input type="password" class="form-control" id="oldPassword" autocomplete="current-password" placeholder="请输入当前密码">
            </div>
            <div class="mb-3">
                <label class="form-label">新密码</label>
                <input type="password" class="form-control" id="newPassword" autocomplete="new-password" placeholder="请输入新密码">
            </div>
            <div class="mb-3">
                <label class="form-label">确认新密码</label>
                <input type="password" class="form-control" id="confirmPassword" autocomplete="new-password" placeholder="请再次输入新密码">
            </div>
            <div id="passwordStatus" class="footnote" style="text-align:left; margin-bottom:14px;"></div>
            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-primary px-4" style="border-radius:20px; background-color:#35b8e0; border:none;">确认修改</button>
                <button type="button" class="btn btn-light px-4" style="border-radius:20px;" id="cancelPasswordBtn">取消</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";
        const user = ApiClient.requireAuth("TEACHER");
        if (!user) return;

        const settingsForm = document.getElementById("settingsForm");
        const saveBtn = document.getElementById("saveBtn");
        const changePasswordBtn = document.getElementById("changePasswordBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const settingsStatus = document.getElementById("settingsStatus");
        const passwordModal = document.getElementById("passwordModal");
        const passwordForm = document.getElementById("passwordForm");
        const oldPassword = document.getElementById("oldPassword");
        const newPassword = document.getElementById("newPassword");
        const confirmPassword = document.getElementById("confirmPassword");
        const passwordStatus = document.getElementById("passwordStatus");
        const closePasswordModalBtn = document.getElementById("closePasswordModalBtn");
        const cancelPasswordBtn = document.getElementById("cancelPasswordBtn");
        const inputs = {
            fullName: document.getElementById("fullName"),
            email: document.getElementById("email"),
            department: document.getElementById("department"),
            title: document.getElementById("title"),
            researchArea: document.getElementById("researchArea"),
            office: document.getElementById("office")
        };

        //状态显示
        function setStatus(message, type) {
            if (!settingsStatus) return;
            settingsStatus.textContent = message;
            settingsStatus.style.color = type === "error" ? "#c74545" : type === "success" ? "var(--green)" : "var(--muted)";
        }

        function setPasswordStatus(message, type) {
            if (!passwordStatus) return;
            passwordStatus.textContent = message || "";
            passwordStatus.style.color = type === "error" ? "#c74545" : type === "success" ? "var(--green)" : "var(--muted)";
        }

        function openPasswordModal() {
            passwordModal.style.display = "flex";
            passwordModal.setAttribute("aria-hidden", "false");
            passwordForm.reset();
            setPasswordStatus("", "");
            oldPassword.focus();
        }

        function closePasswordModal() {
            passwordModal.style.display = "none";
            passwordModal.setAttribute("aria-hidden", "true");
            passwordForm.reset();
            setPasswordStatus("", "");
        }

        //填充表单数据
        function fillProfile(profile) {
            inputs.fullName.value = profile.fullName || "";
            inputs.email.value = profile.email || "";
            inputs.department.value = profile.department || "";
            inputs.title.value = profile.title || "";
            inputs.researchArea.value = profile.researchArea || "";
            inputs.office.value = profile.office || "";
        }

        //连接后端获取个人资料
        async function fetchProfile() {
            setStatus("正在加载个人资料...", "");
            try {
                const profile = await ApiClient.teacher.getProfile();
                fillProfile(profile || {});
                if (profile?.fullName) {
                    localStorage.setItem("fullName", profile.fullName);
                }
                setStatus("个人资料已同步。", "success");
            } catch (error) {
                console.error(error);
                setStatus(error.message || "个人资料加载失败，请稍后重试。", "error");
            }
        }

        //连接后端修改个人资料（保存）
        async function saveProfile(event) {
            event.preventDefault();

            const fullName = inputs.fullName.value.trim();
            const email = inputs.email.value.trim();
            if (!fullName) {
                setStatus("姓名不能为空，请填写。", "error");
                inputs.fullName.focus();
                return;
            }
            if (!email) {
                setStatus("邮箱不能为空，请填写。", "error");
                inputs.email.focus();
                return;
            }

            const payload = {
                fullName,
                email,
                department: inputs.department.value.trim(),
                title: inputs.title.value.trim(),
                researchArea: inputs.researchArea.value.trim(),
                office: inputs.office.value.trim()
            };

            const originalText = saveBtn.textContent;
            saveBtn.disabled = true;
            saveBtn.textContent = "保存中...";
            setStatus("正在保存个人资料...", "");

            try {
                await ApiClient.teacher.updateProfile(payload);
                localStorage.setItem("fullName", payload.fullName);
                setStatus("个人设置已保存。", "success");
            } catch (error) {
                console.error(error);
                setStatus(error.message || "保存失败，请稍后重试。", "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = originalText;
            }
        }

        fetchProfile();
        settingsForm.addEventListener("submit", saveProfile);
        changePasswordBtn.addEventListener("click", openPasswordModal);
        closePasswordModalBtn.addEventListener("click", closePasswordModal);
        cancelPasswordBtn.addEventListener("click", closePasswordModal);
        passwordModal.addEventListener("click", event => {
            if (event.target === passwordModal) {
                closePasswordModal();
            }
        });
        document.addEventListener("keydown", event => {
            if (event.key === "Escape" && passwordModal.style.display === "flex") {
                closePasswordModal();
            }
        });
        passwordForm.addEventListener("submit", async event => {
            event.preventDefault();
            const oldPasswordValue = oldPassword.value.trim();
            const newPasswordValue = newPassword.value.trim();
            const confirmPasswordValue = confirmPassword.value.trim();

            if (!oldPasswordValue) {
                setPasswordStatus("请输入当前密码。", "error");
                oldPassword.focus();
                return;
            }
            if (!newPasswordValue) {
                setPasswordStatus("请输入新密码。", "error");
                newPassword.focus();
                return;
            }
            if (newPasswordValue !== confirmPasswordValue) {
                setPasswordStatus("两次输入的新密码不一致。", "error");
                confirmPassword.focus();
                return;
            }

            const submitBtn = passwordForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = "修改中...";
            setPasswordStatus("正在提交密码修改...", "");

            try {
                await ApiClient.teacher.changePassword(oldPasswordValue, newPasswordValue);
                setPasswordStatus("密码修改成功。", "success");
                setStatus("密码修改成功。", "success");
                setTimeout(closePasswordModal, 700);
            } catch (error) {
                console.error(error);
                setPasswordStatus(error.message || "密码修改失败，请稍后重试。", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
        logoutBtn.addEventListener("click", () => ApiClient.logout());

        //default sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
