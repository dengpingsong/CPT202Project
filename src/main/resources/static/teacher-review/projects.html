<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 我的项目</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="active">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <main class="main-content">
        <div class="page-header teacher-toolbar">
            <h1 class="page-title">我的项目</h1>
            <button class="btn-publish" onclick="window.location.href='create-project.html'"><i class="bi bi-plus-lg"></i> 创建新项目</button>
        </div>
        <div class="custom-card">
            <div class="project-grid">
                <div class="project-card">
                    <h5>An online project selection system</h5>
                    <p>Web 开发 / Spring Boot / Vue ...</p>
                    <span class="badge status-available">Available - 正在招募 (2/3)</span>
                    <button class="btn-secondary">查看申请配置</button>
                </div>
                <div class="project-card">
                    <h5>AI Chatbot for Education</h5>
                    <p>人工智能 / 大语言模型 / GPT ...</p>
                    <span class="badge status-available">Available - 正在招募 (1/2)</span>
                    <button class="btn-secondary">查看申请配置</button>
                </div>
                <div class="project-card">
                    <h5>Campus Navigation App</h5>
                    <p>移动开发 / GIS / React Native ...</p>
                    <span class="badge status-unavailable">Closed - 已满员 (3/3)</span>
                    <button class="btn-secondary">查看详情</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</div>

<script>
    (function() {
        "use strict";
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
