<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 审批申请</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="active">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <main class="main">
        <header class="page-header">
            <h1 class="mb-0">审批申请 (Review Requests)</h1>
        </header>

        <div class="panel">
            <h3>待处理的申请</h3>
            <div id="reviewStatus" class="footnote" style="text-align:left;">正在加载待审批申请...</div>
            <div class="table-wrapper">
                <table class="project-table mt-3">
                    <thead>
                        <tr>
                            <th>学生</th>
                            <th>项目</th>
                            <th>申请时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody">
                        <tr>
                            <td colspan="5" class="text-center" style="color: var(--muted);">正在加载...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";
        const user = ApiClient.requireAuth("TEACHER");
        if (!user) return;

        const requestTableBody = document.getElementById("requestTableBody");
        const reviewStatus = document.getElementById("reviewStatus");

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 16);
            return date.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        //mapping 可读文本
        function statusText(status) {
            const map = {
                PENDING: "待审批",
                ACCEPTED: "已同意",
                REJECTED: "已拒绝",
                WITHDRAWN: "已撤回"
            };
            const normalized = String(status || "UNKNOWN").toUpperCase();
            return map[normalized] || normalized;
        }
        //提示词 （error: 红色）
        function setStatus(message, type) {
            if (!reviewStatus) return;
            reviewStatus.textContent = message;
            reviewStatus.style.color = type === "error" ? "#c74545" : "var(--muted)";
        }

        function renderRequests(requests) {
            if (!requestTableBody) return;//老师看到的申请列表表格区域

            if (!requests.length) {
                requestTableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center" style="color: var(--muted);">暂无待审批的申请。</td>
                    </tr>
                `;
                setStatus("当前没有待审批申请。", "");
                return;
            }

            requestTableBody.innerHTML = requests.map(request => {
                const requestId = esc(request.requestId);
                const notes = request.notes ? `<br><span style="color: var(--muted); font-size: 0.86rem;">备注：${esc(request.notes)}</span>` : "";
                return `
                    <tr>
                        <td>${esc(request.studentName || "-")}</td>
                        <td>
                            <strong>${esc(request.projectTitle || "-")}</strong>
                            ${notes}
                        </td>
                        <td>${esc(formatDate(request.submittedAt))}</td>
                        <td><span class="status-pill status-requested">${esc(statusText(request.requestStatus))}</span></td>
                        <td>
                            <button class="btn-secondary detail-btn" type="button" data-id="${requestId}" style="padding: 8px 14px; margin-right: 8px;">
                                <i class="bi bi-eye"></i> 详情
                            </button>
                            <button class="btn-primary review-btn" data-id="${requestId}" data-action="ACCEPTED" style="padding: 8px 14px; margin-right: 8px;">
                                <i class="bi bi-check2-circle"></i> 同意
                            </button>
                            <button class="btn-secondary review-btn" data-id="${requestId}" data-action="REJECTED" style="padding: 8px 14px; border-color: #f56c6c; color: #f56c6c;">
                                <i class="bi bi-x-circle"></i> 拒绝
                            </button>
                        </td>
                    </tr>
                `;
            }).join("");

            setStatus(`共 ${requests.length} 条待审批申请。`, "");
            bindReviewButtons();
        }

        //submit
        async function submitReview(requestId, requestStatus, decisionComment) {
            setStatus("正在提交审核结果...", "");
            try {
                await ApiClient.teacher.reviewRequest(requestId, requestStatus, decisionComment);
                setStatus("审核结果已保存。", "");
                await loadRequests();
            } catch (error) {
                console.error(error);
                setStatus(error.message || "审核失败，请稍后重试。", "error");
            }
        }

        //绑定按钮
        function bindReviewButtons() {
            document.querySelectorAll(".detail-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const requestId = btn.getAttribute("data-id");
                    if (requestId) {
                        window.location.href = `request-detail.html?requestId=${encodeURIComponent(requestId)}`;
                    }
                });
            });

            document.querySelectorAll(".review-btn").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const requestId = btn.getAttribute("data-id");
                    const action = btn.getAttribute("data-action");
                    if (!requestId || !action) return;

                    if (action === "REJECTED") {
                        const comment = window.prompt("请输入拒绝原因（可选）：", "");
                        if (comment === null) return;
                        await submitReview(requestId, action, comment.trim());
                        return;
                    }

                    if (window.confirm("确认同意这条申请吗？")) {
                        await submitReview(requestId, action, "");
                    }
                });
            });
        }

        //加载待审批申请
        async function loadRequests() {
            if (!requestTableBody) return;
            requestTableBody.innerHTML = `
                <tr>
                    <td colspan="5" class="text-center" style="color: var(--muted);">正在加载...</td>
                </tr>
            `;
            setStatus("正在加载待审批申请...", "");

            try {
                const requests = await ApiClient.teacher.listRequests("PENDING");
                renderRequests(Array.isArray(requests) ? requests : []);
            } catch (error) {
                console.error(error);
                requestTableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center" style="color: #c74545;">加载失败：${esc(error.message || "请稍后重试")}</td>
                    </tr>
                `;
                setStatus(error.message || "待审批申请加载失败。", "error");
            }
        }
        loadRequests();

        //default sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
