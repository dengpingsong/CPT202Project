<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 审批申请</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="active">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <main class="main">
        <header class="page-header">
            <h1 class="mb-0">审批申请 (Review Requests)</h1>
        </header>

        <div class="panel">
            <h3>待处理的申请</h3>
            <div class="table-wrapper">
                <table class="project-table mt-3">
                    <thead>
                        <tr>
                            <th>学生</th>
                            <th>项目</th>
                            <th>申请时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="requestTableBody">
                        <tr>
                            <td colspan="5" class="text-center" style="color: var(--muted);">暂无待审批的申请数据，这里可以等后端接口联调。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</div>

<script>
    (function() {
        "use strict";
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
