<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 历史记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
    <style>
        .history-header {
            padding: 0;
        }
        .history-panel {
            border: 1px solid rgba(90, 43, 152, 0.16);
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(90, 43, 152, 0.05);
        }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="active">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <main class="main">
        <header class="page-header history-header">
            <h1>History</h1>
        </header>

        <div class="panel history-panel">
            <div id="historyStatus" class="footnote" style="text-align:left;">正在加载历史记录...</div>
            <div class="timeline-vertical" id="historyTimeline">
                <div class="item">
                    <div class="timeline-title">正在加载历史记录</div>
                    <div class="timeline-desc">请稍候</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";
        const user = ApiClient.requireAuth("TEACHER");
        if (!user) return;

        const historyTimeline = document.getElementById("historyTimeline");
        const historyStatus = document.getElementById("historyStatus");

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 16);
            return date.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        //统一大写
        function normalizeStatus(status) {
            return String(status || "UNKNOWN").toUpperCase();
        }

        function statusText(status) {
            const map = {
                ACCEPTED: "同意",
                REJECTED: "拒绝",
                WITHDRAWN: "已撤回",
                PENDING: "待审批"
            };
            const normalized = normalizeStatus(status);
            return map[normalized] || normalized;
        }

        //设置css颜色
        function statusColor(status) {
            const normalized = normalizeStatus(status);
            if (normalized === "ACCEPTED") return "color: var(--green);";
            if (normalized === "REJECTED") return "color: var(--orange);";
            if (normalized === "WITHDRAWN") return "color: var(--muted);";
            return "color: var(--deep);";
        }

        //时间优先级
        function historyTime(request) {
            return request.reviewedAt || request.withdrawnAt || request.submittedAt;
        }

        //提示词（error: 红色）
        function setStatus(message, type) {
            if (!historyStatus) return;
            historyStatus.textContent = message;
            historyStatus.style.color = type === "error" ? "#c74545" : "var(--muted)";
        }

        //构建历史记录项（申请后自动构建）
        function buildHistoryItems(requests) {
            return requests
                .filter(request => normalizeStatus(request.requestStatus) !== "PENDING")//过滤掉待审批申请
                .map(request => ({
                    requestId: request.requestId,
                    studentName: request.studentName || "-",
                    studentId: request.studentId || "-",
                    projectTitle: request.projectTitle || "未命名项目",
                    status: normalizeStatus(request.requestStatus),
                    notes: request.notes || "",
                    decisionComment: request.decisionComment || "",
                    changedAt: historyTime(request)
                }))
                .sort((a, b) => new Date(b.changedAt || 0) - new Date(a.changedAt || 0));//按时间倒序排序
        }

        function renderHistory(items) {
            if (!historyTimeline) return;

            if (!items.length) {
                historyTimeline.innerHTML = `
                    <div class="item">
                        <div class="timeline-title">暂无历史记录</div>
                        <div class="timeline-desc">完成审批后，历史记录会显示在这里。</div>
                    </div>
                `;
                setStatus("当前没有历史记录。", "");
                return;
            }

            historyTimeline.innerHTML = items.map(item => {
                const parts = [
                    `学生：${esc(item.studentName)} (ID: ${esc(item.studentId)})`,
                    `项目：${esc(item.projectTitle)}`
                ];
                if (item.notes) parts.push(`申请备注：${esc(item.notes)}`);
                if (item.decisionComment) parts.push(`审核反馈：${esc(item.decisionComment)}`);

                return `
                    <div class="item">
                        <div class="timeline-date">${esc(formatDate(item.changedAt))}</div>
                        <div class="timeline-title" style="${statusColor(item.status)}">审批操作 - ${esc(statusText(item.status))}</div>
                        <div class="timeline-desc">${parts.join("<br>")}</div>
                    </div>
                `;
            }).join("");

            setStatus(`共 ${items.length} 条历史记录。`, "");
        }

        async function loadHistory() {
            if (!historyTimeline) return;
            historyTimeline.innerHTML = `
                <div class="item">
                    <div class="timeline-title">正在加载历史记录</div>
                    <div class="timeline-desc">请稍候</div>
                </div>
            `;
            setStatus("正在加载历史记录...", "");

            try {
                const requests = await ApiClient.teacher.listHistory();
                renderHistory(buildHistoryItems(Array.isArray(requests) ? requests : []));
            } catch (error) {
                console.error(error);
                historyTimeline.innerHTML = `
                    <div class="item">
                        <div class="timeline-title" style="color: #c74545;">历史记录加载失败</div>
                        <div class="timeline-desc">${esc(error.message || "请稍后重试")}</div>
                    </div>
                `;
                setStatus(error.message || "历史记录加载失败。", "error");
            }
        }

        loadHistory();

        //default sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
