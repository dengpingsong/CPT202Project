<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 历史记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="active">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <main class="main">
        <header class="page-header">
            <h1>历史记录 (History Logs)</h1>
        </header>

        <div class="panel">
            <div class="timeline-vertical">
                <div class="item">
                    <div class="timeline-date">2026-04-10 10:30 AM</div>
                    <div class="timeline-title" style="color: var(--deep);">审批操作 - 同意</div>
                    <div class="timeline-desc">您同意了学生 张三 (ID: 21) 对项目 "Campus Navigation App" 的申请。</div>
                </div>
                <div class="item">
                    <div class="timeline-date">2026-04-09 14:15 PM</div>
                    <div class="timeline-title" style="color: var(--orange);">审批操作 - 拒绝</div>
                    <div class="timeline-desc">您拒绝了学生 李四 (ID: 35) 对项目 "An online project selection system" 的申请。</div>
                </div>
                <div class="item">
                    <div class="timeline-date">2026-04-02 09:00 AM</div>
                    <div class="timeline-title" style="color: var(--green);">项目管理 - 发布新项目</div>
                    <div class="timeline-desc">您成功发布了新项目 "AI Chatbot for Education"。</div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</div>

<script>
    (function() {
        "use strict";
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
