<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 历史记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>

        /* ----- 全局变量 & 基础样式 (完全沿用 dashboard 设计语言) ----- */
        :root {
            --bg: #f4f3f7;
            --deep: #5a2b98;
            --mid: #7b4fbd;
            --panel: #ffffff;
            --text: #1c1b33;
            --muted: #6b6b82;
            --accent: #24b3ff;
            --orange: #f6a63d;
            --green: #2fc5a8;
            --border: rgba(28, 27, 51, 0.08);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* 经典双列布局 */
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            transition: grid-template-columns .3s ease;
        }

        .layout.collapsed {
            grid-template-columns: 80px 1fr;
        }

        /* ---------- 侧边栏 (与 dashboard 完全一致) ---------- */
        .sidebar {
            background: linear-gradient(180deg, #3d1566, #631e97);
            padding: 24px 16px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .sidebar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 60%);
            pointer-events: none;
        }

        .toggle-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            margin-bottom: 4px;
        }

        .toggle {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .3s ease;
            position: relative;
        }

        .toggle span,
        .toggle span::before,
        .toggle span::after {
            display: block;
            width: 22px;
            height: 2px;
            background: white;
            transition: all .3s ease;
            position: absolute;
        }

        .toggle span {
            background: transparent;
        }

        .toggle span::before {
            content: "";
            top: 0;
            transform: rotate(45deg);
        }

        .toggle span::after {
            content: "";
            top: 0;
            transform: rotate(-45deg);
        }

        .layout.collapsed .toggle span {
            background: white;
        }

        .layout.collapsed .toggle span::before {
            top: -8px;
            transform: none;
        }

        .layout.collapsed .toggle span::after {
            top: 8px;
            transform: none;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .nav-group a,
        .nav-group button {
            border: none;
            background: transparent;
            color: white;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s, padding .2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
            text-decoration: none;
            font-weight: 400;
            font-family: inherit;
        }

        .nav-group a.active,
        .nav-group button.active,
        .nav-group a:hover,
        .nav-group button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        .nav-label {
            transition: opacity .3s ease;
            white-space: nowrap;
        }

        .layout.collapsed .nav-group a,
        .layout.collapsed .nav-group button {
            justify-content: center;
            padding: 12px;
        }

        .layout.collapsed .nav-label {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        
        
        .main-content { flex-grow: 1; padding: 30px 40px; overflow-y: auto; height: 100vh; }
        .page-title { font-size: 24px; font-weight: bold; margin-bottom: 24px; color: #222; }
        .custom-card { background: white; border-radius: var(--card-radius); padding: 28px; margin-bottom: 24px; }
        
        .timeline { border-left: 2px solid #e0e0e0; padding-left: 20px; margin-left: 10px; }
        .timeline-item { position: relative; margin-bottom: 25px; }
        .timeline-item::before { content: ''; position: absolute; left: -27px; top: 5px; width: 12px; height: 12px; background: var(--sidebar-bg); border-radius: 50%; }
        .timeline-date { font-size: 12px; color: #999; margin-bottom: 5px; }
        .timeline-title { font-weight: bold; color: #333; font-size: 15px; }
        .timeline-desc { font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="active">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <div class="main-content">
        <h2 class="page-title">历史记录 (History Logs)</h2>
        <div class="custom-card">
            <div class="timeline">
                <div class="timeline-item">
                    <div class="timeline-date">2026-04-10 10:30 AM</div>
                    <div class="timeline-title">审批操作 - 同意</div>
                    <div class="timeline-desc">您同意了学生 张三 (ID: 21) 对项目 "Campus Navigation App" 的申请。</div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-date">2026-04-09 14:15 PM</div>
                    <div class="timeline-title">审批操作 - 拒绝</div>
                    <div class="timeline-desc">您拒绝了学生 李四 (ID: 35) 对项目 "An online project selection system" 的申请。</div>
                </div>
                <div class="timeline-item">
                    <div class="timeline-date">2026-04-02 09:00 AM</div>
                    <div class="timeline-title">项目管理 - 发布新项目</div>
                    <div class="timeline-desc">您成功发布了新项目 "AI Chatbot for Education"。</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</div>

<script>
    (function() {
        "use strict";
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
