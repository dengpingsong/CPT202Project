<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 发布新项目</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <header class="page-header">
            <a href="projects.html" class="back-link"><i class="bi bi-arrow-left"></i> 返回我的项目</a>
            <h1 class="mb-0">发布新项目 (Publish New Project)</h1>
        </header>

        <div class="panel">
            <form id="createProjectForm">
                <div class="mb-4">
                    <label class="form-label">项目名称 (Project Title) <span class="text-danger">*</span></label>
                    <input
                            type="text"
                            class="form-control"
                            id="projectTitle"
                            placeholder="例如：Student Project Allocation System"
                            required
                    >
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">招募人数 (Quota) <span class="text-danger">*</span></label>
                        <select class="form-select" id="projectQuota" required>
                            <option value="1">1 人</option>
                            <option value="2">2 人</option>
                            <option value="3" selected>3 人</option>
                            <option value="4">4 人</option>
                            <option value="5">5 人</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">项目分类 (Category) <span class="text-danger">*</span></label>
                        <select class="form-select" id="projectCategoryId" required>
                            <option value="">正在加载分类...</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">项目描述 (Description) <span class="text-danger">*</span></label>
                    <textarea
                            class="form-control"
                            id="projectDescription"
                            rows="4"
                            placeholder="请简要描述项目的目的、主要功能模块及预期成果..."
                            required
                    ></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">能力要求 (Requirements)</label>
                    <textarea
                            class="form-control"
                            id="projectRequirements"
                            rows="3"
                            placeholder="例如：具备一定的Java基础，了解Spring Boot和关系型数据库..."
                    ></textarea>
                </div>

                <!-- 新增：脚本里会读取这个字段 -->
                <div class="mb-4">
                    <label class="form-label">研究方向 (Topic Area)</label>
                    <input
                            type="text"
                            class="form-control"
                            id="projectTopicArea"
                            placeholder="例如：AI in Education / 数据可视化"
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label">技能标签 (Tags)</label>
                    <div class="tag-input-group" id="tagsContainer">
                        <div class="input-group" id="tagInputGroup" style="width: 220px; margin-bottom: 8px;">
                            <input type="text" class="form-control form-control-sm" id="tagInput" placeholder="输入自定义标签...">
                            <button
                                    class="btn btn-outline-secondary btn-sm"
                                    type="button"
                                    id="addTagBtn"
                                    style="background: white; border-color: #ddd;"
                            >
                                添加
                            </button>
                        </div>
                    </div>
                </div>

                <hr style="border-color: #eee; margin: 30px 0;">
                <div class="text-danger mb-3" id="formError"></div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-publish" id="publishBtn">
                        <i class="bi bi-rocket-takeoff"></i> 确认发布 (Publish)
                    </button>
                    <button
                            type="button"
                            class="btn btn-light"
                            style="border-radius: 20px; padding: 10px 25px;"
                            id="cancelBtn"
                    >
                        取消 (Cancel)
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function () {
        "use strict";
        const user = ApiClient.requireAuth("TEACHER");
        if (!user) return;

        const form = document.getElementById("createProjectForm");
        const publishBtn = document.getElementById("publishBtn");
        const formError = document.getElementById("formError");
        const categorySelect = document.getElementById("projectCategoryId");
        const tagInput = document.getElementById("tagInput");
        const addTagBtn = document.getElementById("addTagBtn");
        const cancelBtn = document.getElementById("cancelBtn");
        const tagsContainer = document.getElementById("tagsContainer");
        const tagInputGroup = document.getElementById("tagInputGroup");

        function setError(message, type) {
            if (!formError) return;
            formError.textContent = message || "";
            formError.style.color = type === "success" ? "var(--green)" : "#c74545";
        }

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function renderCategories(categories) {
            if (!categorySelect) return;
            if (!Array.isArray(categories) || categories.length === 0) {
                categorySelect.innerHTML = '<option value="">暂无可用分类</option>';
                return;
            }

            categorySelect.innerHTML = '<option value="">请选择项目分类</option>' + categories.map(category => `
                <option value="${esc(category.categoryId)}">${esc(category.categoryName)}</option>
            `).join("");
        }

        async function loadCategories() {
            if (!categorySelect) return;
            categorySelect.disabled = true;
            try {
                const categories = await ApiClient.teacher.listCategories();
                renderCategories(categories);
            } catch (error) {
                console.error(error);
                categorySelect.innerHTML = '<option value="">分类加载失败</option>';
                setError(error.message || "分类加载失败，请稍后重试。", "error");
            } finally {
                categorySelect.disabled = false;
            }
        }

        function getTagList() {
            const wrappers = document.querySelectorAll("#tagsContainer .tag-wrapper");
            const tags = [];

            wrappers.forEach(tagEl => {
                const value = (tagEl.dataset.tag || "").trim();
                if (value) tags.push(value);
            });

            return tags;
        }

        function addTag() {
            if (!tagInput || !tagsContainer || !tagInputGroup) return;

            const value = tagInput.value.trim();
            if (!value) return;

            const exists = Array.from(tagsContainer.querySelectorAll(".tag-wrapper"))
                .some(el => (el.dataset.tag || "").toLowerCase() === value.toLowerCase());
            if (exists) {
                tagInput.value = "";
                return;
            }

            const tag = document.createElement("span");
            tag.className = "badge me-2 mb-2 p-2 tag-wrapper";
            tag.dataset.tag = value;
            tag.style.backgroundColor = "#5f3391";
            tag.style.fontSize = "14px";
            tag.style.fontWeight = "normal";
            tag.innerHTML = `${value} <i class="bi bi-x-circle ms-1" style="cursor:pointer;"></i>`;

            tag.querySelector("i").addEventListener("click", () => tag.remove());
            tagsContainer.insertBefore(tag, tagInputGroup);
            tagInput.value = "";
        }

        function buildPayload() {
            const requirements = document.getElementById("projectRequirements").value.trim();
            const tags = getTagList();
            const requiredSkills = [requirements, ...tags].filter(Boolean).join(" / ");

            return {
                categoryId: Number(categorySelect.value),
                title: document.getElementById("projectTitle").value.trim(),
                description: document.getElementById("projectDescription").value.trim(),
                requiredSkills,
                topicArea: document.getElementById("projectTopicArea").value.trim(),
                maxStudents: Number(document.getElementById("projectQuota").value)
            };
        }

        function validatePayload(payload) {
            if (!payload.categoryId) return "请选择项目分类。";
            if (!payload.title) return "项目名称不能为空。";
            if (!payload.description) return "项目描述不能为空。";
            if (!payload.maxStudents || payload.maxStudents < 1) return "招募人数必须大于等于 1。";
            return "";
        }

        async function submitProject(event) {
            event.preventDefault();
            const payload = buildPayload();
            const error = validatePayload(payload);
            if (error) {
                setError(error, "error");
                return;
            }

            const originalText = publishBtn.innerHTML;
            publishBtn.disabled = true;
            publishBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 发布中...';
            setError("正在发布项目...", "success");

            try {
                await ApiClient.teacher.createProject(payload);
                setError("发布成功，正在返回项目列表...", "success");
                window.location.href = "projects.html";
            } catch (error) {
                console.error(error);
                setError(error.message || "发布失败，请稍后重试。", "error");
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerHTML = originalText;
            }
        }

        addTagBtn.addEventListener("click", addTag);
        cancelBtn.addEventListener("click", () => {
            window.location.href = "projects.html";
        });
        tagInput.addEventListener("keydown", event => {
            if (event.key === "Enter") {
                event.preventDefault();
                addTag();
            }
        });
        form.addEventListener("submit", submitProject);
        loadCategories();

        //default sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if (layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
