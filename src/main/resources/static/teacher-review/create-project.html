<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 发布新项目</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    <main class="main">
        <header class="page-header">
            <a href="projects.html" class="back-link"><i class="bi bi-arrow-left"></i> 返回我的项目</a>
            <h1 class="mb-0">发布新项目 (Publish New Project)</h1>
        </header>

        <div class="panel">
            <form id="createProjectForm">
                <div class="mb-4">
                    <label class="form-label">项目名称 (Project Title) <span class="text-danger">*</span></label>
                    <input
                            type="text"
                            class="form-control"
                            id="projectTitle"
                            placeholder="例如：Student Project Allocation System"
                            required
                    >
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">招募人数 (Quota) <span class="text-danger">*</span></label>
                        <select class="form-select" id="projectQuota" required>
                            <option value="1">1 人</option>
                            <option value="2">2 人</option>
                            <option value="3" selected>3 人</option>
                            <option value="4">4 人</option>
                            <option value="5">5 人</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">分类 ID (Category ID) <span class="text-danger">*</span></label>
                        <input
                                type="number"
                                class="form-control"
                                id="projectCategoryId"
                                min="1"
                                placeholder="例如：1"
                                required
                        >
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">项目描述 (Description) <span class="text-danger">*</span></label>
                    <textarea
                            class="form-control"
                            id="projectDescription"
                            rows="4"
                            placeholder="请简要描述项目的目的、主要功能模块及预期成果..."
                            required
                    ></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">能力要求 (Requirements)</label>
                    <textarea
                            class="form-control"
                            id="projectRequirements"
                            rows="3"
                            placeholder="例如：具备一定的Java基础，了解Spring Boot和关系型数据库..."
                    ></textarea>
                </div>

                <!-- 新增：脚本里会读取这个字段 -->
                <div class="mb-4">
                    <label class="form-label">研究方向 (Topic Area)</label>
                    <input
                            type="text"
                            class="form-control"
                            id="projectTopicArea"
                            placeholder="例如：AI in Education / 数据可视化"
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label">技能标签 (Tags)</label>
                    <div class="tag-input-group" id="tagsContainer">
                        <!-- 示例标签 -->
                        <span class="badge me-2 mb-2 p-2 tag-wrapper" data-tag="Java"
                              style="background-color:#5f3391; font-size:14px; font-weight:normal;">
                            Java
                            <i class="bi bi-x-circle ms-1" style="cursor:pointer;" onclick="this.parentElement.remove()"></i>
                        </span>
                        <span class="badge me-2 mb-2 p-2 tag-wrapper" data-tag="Web开发"
                              style="background-color:#5f3391; font-size:14px; font-weight:normal;">
                            Web开发
                            <i class="bi bi-x-circle ms-1" style="cursor:pointer;" onclick="this.parentElement.remove()"></i>
                        </span>

                        <!-- 添加框 -->
                        <div class="input-group" id="tagInputGroup" style="width: 220px; margin-bottom: 8px;">
                            <input type="text" class="form-control form-control-sm" id="tagInput" placeholder="输入自定义标签...">
                            <button
                                    class="btn btn-outline-secondary btn-sm"
                                    type="button"
                                    onclick="addTag()"
                                    style="background: white; border-color: #ddd;"
                            >
                                添加
                            </button>
                        </div>
                    </div>
                    <div class="form-text mt-2">
                        <i class="bi bi-info-circle"></i>
                        标签将自动合并到 requiredSkills 提交给后端（简单方案先跑通）。
                    </div>
                </div>

                <hr style="border-color: #eee; margin: 30px 0;">
                <div class="text-danger mb-3" id="formError"></div>

                <div class="d-flex gap-3">
                    <button type="button" class="btn btn-publish" id="publishBtn" onclick="submitProject()">
                        <i class="bi bi-rocket-takeoff"></i> 确认发布 (Publish)
                    </button>
                    <button
                            type="button"
                            class="btn btn-light"
                            style="border-radius: 20px; padding: 10px 25px;"
                            onclick="window.location.href='projects.html'"
                    >
                        取消 (Cancel)
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<!-- 调用外部脚本 -->
<script src="script.js"></script>

<!-- 侧边栏收起/展开 -->
<script>
    (function () {
        "use strict";
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if (layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
