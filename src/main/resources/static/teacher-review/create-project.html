<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 发布新项目</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>

        /* ----- 全局变量 & 基础样式 (完全沿用 dashboard 设计语言) ----- */
        :root {
            --bg: #f4f3f7;
            --deep: #5a2b98;
            --mid: #7b4fbd;
            --panel: #ffffff;
            --text: #1c1b33;
            --muted: #6b6b82;
            --accent: #24b3ff;
            --orange: #f6a63d;
            --green: #2fc5a8;
            --border: rgba(28, 27, 51, 0.08);
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* 经典双列布局 */
        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            transition: grid-template-columns .3s ease;
        }

        .layout.collapsed {
            grid-template-columns: 80px 1fr;
        }

        /* ---------- 侧边栏 (与 dashboard 完全一致) ---------- */
        .sidebar {
            background: linear-gradient(180deg, #3d1566, #631e97);
            padding: 24px 16px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .sidebar::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 60%);
            pointer-events: none;
        }

        .toggle-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            margin-bottom: 4px;
        }

        .toggle {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .3s ease;
            position: relative;
        }

        .toggle span,
        .toggle span::before,
        .toggle span::after {
            display: block;
            width: 22px;
            height: 2px;
            background: white;
            transition: all .3s ease;
            position: absolute;
        }

        .toggle span {
            background: transparent;
        }

        .toggle span::before {
            content: "";
            top: 0;
            transform: rotate(45deg);
        }

        .toggle span::after {
            content: "";
            top: 0;
            transform: rotate(-45deg);
        }

        .layout.collapsed .toggle span {
            background: white;
        }

        .layout.collapsed .toggle span::before {
            top: -8px;
            transform: none;
        }

        .layout.collapsed .toggle span::after {
            top: 8px;
            transform: none;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .nav-group a,
        .nav-group button {
            border: none;
            background: transparent;
            color: white;
            font-size: 0.95rem;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s, padding .2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-start;
            text-decoration: none;
            font-weight: 400;
            font-family: inherit;
        }

        .nav-group a.active,
        .nav-group button.active,
        .nav-group a:hover,
        .nav-group button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        .nav-label {
            transition: opacity .3s ease;
            white-space: nowrap;
        }

        .layout.collapsed .nav-group a,
        .layout.collapsed .nav-group button {
            justify-content: center;
            padding: 12px;
        }

        .layout.collapsed .nav-label {
            opacity: 0;
            width: 0;
            overflow: hidden;
        }

        
        
        
        .main-content { flex-grow: 1; padding: 30px 40px; overflow-y: auto; height: 100vh; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #666; text-decoration: none; margin-bottom: 20px; font-size: 15px; transition: 0.2s; }
        .back-link:hover { color: var(--sidebar-bg); }
        .page-title { font-size: 24px; font-weight: bold; margin-bottom: 24px; color: #222; }
        
        .custom-card { background: white; border-radius: var(--card-radius); border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.02); padding: 30px; margin-bottom: 24px; max-width: 800px; }
        
        .form-label { font-weight: bold; color: #444; font-size: 15px; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #ddd; padding: 10px 15px; background-color: #fafbfc;}
        .form-control:focus, .form-select:focus { box-shadow: 0 0 0 3px rgba(95, 51, 145, 0.1); border-color: var(--sidebar-bg); }
        
        .tag-input-group { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; background: #fafbfc; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .tag-wrapper { display: inline-flex; align-items: center; }
        .tag-wrapper i:hover { color: #ffcccc; }
        
        .btn-publish { background-color: var(--btn-primary-bg); color: white; border-radius: 20px; padding: 10px 30px; font-weight: bold; border: none; transition: 0.2s; box-shadow: 0 4px 12px rgba(53, 184, 224, 0.2);}
        .btn-publish:hover { background-color: #2ab0d6; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(53, 184, 224, 0.3); color: white;}
    </style>
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>


    
        

    <div class="main-content">
        <a href="projects.html" class="back-link"><i class="bi bi-arrow-left"></i> 返回我的项目</a>
        <h2 class="page-title">发布新项目 (Publish New Project)</h2>

        <div class="custom-card">
            <form id="createProjectForm">
                
                <div class="mb-4">
                    <label class="form-label">项目名称 (Project Title) <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="projectTitle" placeholder="例如：Student Project Allocation System" required>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">招募人数 (Quota) <span class="text-danger">*</span></label>
                        <select class="form-select" id="projectQuota">
                            <option value="1">1 人</option>
                            <option value="2">2 人</option>
                            <option value="3" selected>3 人</option>
                            <option value="4">4 人</option>
                            <option value="5">5 人</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">截止日期 (Deadline)</label>
                        <input type="date" class="form-control">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">项目描述 (Description) <span class="text-danger">*</span></label>
                    <textarea class="form-control" rows="4" placeholder="请简要描述项目的目的、主要功能模块及预期成果..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">能力要求 (Requirements)</label>
                    <textarea class="form-control" rows="3" placeholder="例如：具备一定的Java基础，了解Spring Boot框架和基本的关系型数据库理论..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">技术/能力标签 (Tags)</label>
                    <div class="tag-input-group" id="tagsContainer">
                        <!-- 默认自带的示例标签 -->
                        <span class="badge me-2 mb-2 p-2 tag-wrapper" style="background-color:#5f3391; font-size:14px; font-weight:normal;">Java <i class="bi bi-x-circle ms-1" style="cursor:pointer;" onclick="this.parentElement.remove()"></i></span>
                        <span class="badge me-2 mb-2 p-2 tag-wrapper" style="background-color:#5f3391; font-size:14px; font-weight:normal;">Web开发 <i class="bi bi-x-circle ms-1" style="cursor:pointer;" onclick="this.parentElement.remove()"></i></span>
                        
                        <!-- 添加框 -->
                        <div class="input-group" id="tagInputGroup" style="width: 200px; margin-bottom: 8px;">
                            <input type="text" class="form-control form-control-sm" id="tagInput" placeholder="输入自定义标签...">
                            <button class="btn btn-outline-secondary btn-sm" type="button" onclick="addTag()" style="background: white; border-color: #ddd;">添加</button>
                        </div>
                    </div>
                    <div class="form-text mt-2"><i class="bi bi-info-circle"></i> 点击添加按钮录入标签，点击标签上的 <b>X</b> 图标删除。支持自由输入（例如：“前端”、“MySQL”、“数据分析”等）。</div>
                </div>

                <hr style="border-color: #eee; margin: 30px 0;">

                <div class="d-flex gap-3">
                    <button type="button" class="btn btn-publish" onclick="submitProject()"><i class="bi bi-rocket-takeoff"></i> 确认发布 (Publish)</button>
                    <button type="button" class="btn btn-light" style="border-radius: 20px; padding: 10px 25px;" onclick="window.location.href='projects.html'">取消 (Cancel)</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Script 逻辑 -->
    <script src="script.js"></script>
    <script>
        // 让按回车键也可以触发添加标签
        document.getElementById('tagInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // 阻止表单提交
                addTag();
            }
        });
    </script>
</div>

<script>
    (function() {
        "use strict";
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
