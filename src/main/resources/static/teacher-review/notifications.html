<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 消息/通知</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="active">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <main class="main">
        <header class="page-header">
            <h1 class="mb-0">消息与系统通知</h1>
        </header>

        <div class="d-flex justify-content-between align-items-center mt-3">
            <div id="notificationStatus" class="footnote" style="text-align:left;">正在加载通知...</div>
            <button class="btn-secondary" id="markAllReadBtn" type="button" style="padding: 8px 14px;">全部已读</button>
        </div>

        <div class="notification-list mt-3" id="notificationList">
            <div class="notification-item">
                <div class="notification-icon">
                    <i class="bi bi-hourglass-split"></i>
                </div>
                <div class="msg-body">
                    <div class="notification-title">正在加载通知</div>
                    <div class="notification-message">请稍候</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script>
    (function() {
        "use strict";
        const user = ApiClient.requireAuth("TEACHER");
        if (!user) return;

        const notificationList = document.getElementById("notificationList");
        const notificationStatus = document.getElementById("notificationStatus");
        const markAllReadBtn = document.getElementById("markAllReadBtn");
        const readStorageKey = `teacherNotificationRead:${user.userId || user.username || "current"}`;//key
        let notifications = [];

        function esc(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        //大写好识别
        function normalizeStatus(status) {
            return String(status || "UNKNOWN").toUpperCase();
        }

        //格式化日期
        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 16);
            return date.toLocaleString("zh-CN", {
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        //本地存储已读状态
        function readMap() {
            try {
                return JSON.parse(localStorage.getItem(readStorageKey) || "{}");
            } catch (error) {
                console.error(error);
                return {};
            }
        }
        //保存已读状态
        function saveRead(id) {
            const map = readMap();
            map[id] = true;
            localStorage.setItem(readStorageKey, JSON.stringify(map));
        }

        //通知时间优先级
        function notificationTime(request) {
            return request.reviewedAt || request.withdrawnAt || request.submittedAt;
        }

        //css类名mapping
        function notificationType(status) {
            if (status === "PENDING") return "new";
            if (status === "WITHDRAWN") return "withdrawn";
            if (status === "ACCEPTED") return "accepted";
            if (status === "REJECTED") return "rejected";
            return "system";
        }

        //mapping
        function notificationTitle(status) {
            if (status === "PENDING") return "新的项目申请提醒";
            if (status === "WITHDRAWN") return "申请撤回通知";
            if (status === "ACCEPTED") return "申请已同意";
            if (status === "REJECTED") return "申请已拒绝";
            return "申请状态更新";
        }

        //消息内容mapping
        function notificationMessage(request, status) {
            const studentName = request.studentName || "该学生";
            const projectTitle = request.projectTitle || "未命名项目";
            if (status === "PENDING") {
                return `学生 ${studentName} 提交了您的项目 “${projectTitle}” 的申请。`;
            }
            if (status === "WITHDRAWN") {
                return `学生 ${studentName} 撤回了对 “${projectTitle}” 项目的申请。`;
            }
            if (status === "ACCEPTED") {
                return `您已同意学生 ${studentName} 对 “${projectTitle}” 项目的申请。`;
            }
            if (status === "REJECTED") {
                return `您已拒绝学生 ${studentName} 对 “${projectTitle}” 项目的申请。`;
            }
            return `学生 ${studentName} 对 “${projectTitle}” 项目的申请状态已更新。`;
        }
        //图标mapping
        function iconClass(type) {
            const map = {
                new: "bi-envelope-paper",
                withdrawn: "bi-exclamation-triangle",
                accepted: "bi-check-circle",
                rejected: "bi-x-circle",
                system: "bi-info-circle"
            };
            return map[type] || "bi-bell";
        }

        //图标样式mapping
        function iconStyle(type) {
            if (type === "withdrawn" || type === "rejected") return "background: rgba(246,166,61,0.1); color: var(--orange);";
            if (type === "accepted") return "background: rgba(47,197,168,0.12); color: var(--green);";
            return "";
        }


        //结构化
        function buildNotifications(requests) {
            const map = readMap();
            return requests.map(request => {
                const status = normalizeStatus(request.requestStatus);
                const time = notificationTime(request);
                const id = `teacher-request-${request.requestId}-${status}-${time || "unknown"}`;
                const type = notificationType(status);
                return {
                    id,
                    type,
                    title: notificationTitle(status),
                    message: notificationMessage(request, status),
                    time,
                    status,
                    read: Boolean(map[id]),
                    requestId: request.requestId
                };
            }).sort((a, b) => {
                if (a.read !== b.read) return a.read ? 1 : -1;
                return new Date(b.time || 0) - new Date(a.time || 0);
            });
        }

        //状态显示display
        function setStatus(message, type) {
            if (!notificationStatus) return;
            notificationStatus.textContent = message;
            notificationStatus.style.color = type === "error" ? "#c74545" : "var(--muted)";
        }

        //渲染通知列表（后端数据（requests） -> buildNotifications -> notifications）到页面）
        function renderNotifications() {
            if (!notificationList) return;

            if (!notifications.length) {
                notificationList.innerHTML = `
                    <div class="notification-item">
                        <div class="notification-icon"><i class="bi bi-bell-slash"></i></div>
                        <div class="msg-body">
                            <div class="notification-title">暂无通知</div>
                            <div class="notification-message">有新的申请动态后会显示在这里。</div>
                        </div>
                    </div>
                `;
                setStatus("当前没有通知。", "");
                markAllReadBtn.disabled = true;
                return;
            }

            const unreadCount = notifications.filter(item => !item.read).length;
            notificationList.innerHTML = notifications.map(item => `
                <div class="notification-item ${item.read ? "" : "unread"}" data-id="${esc(item.id)}">
                    <div class="notification-icon" style="${iconStyle(item.type)}">
                        <i class="bi ${iconClass(item.type)}"></i>
                    </div>
                    <div class="msg-body">
                        <div class="notification-title">
                            ${esc(item.title)}
                            ${!item.read ? '<span class="unread-dot"></span>' : ''}
                        </div>
                        <div class="notification-message">${esc(item.message)}</div>
                        <div class="notification-meta">
                            <span><i class="bi bi-clock"></i> ${esc(formatDate(item.time))}</span>
                            <span><i class="bi bi-tag"></i> ${esc(item.status)}</span>
                        </div>
                    </div>
                    <div class="notification-actions" style="display:flex; gap:8px; align-items:center;">
                        ${!item.read ? `<button class="btn-secondary mark-read-btn" data-id="${esc(item.id)}" type="button" style="padding: 6px 10px;">已读</button>` : ""}
                        <button class="btn-secondary detail-btn" data-request-id="${esc(item.requestId)}" type="button" style="padding: 6px 10px;">
                            <i class="bi bi-arrow-right-circle"></i>
                        </button>
                    </div>
                </div>
            `).join("");

            setStatus(unreadCount === 0 ? "暂无未读通知。" : `${unreadCount} 条未读通知。`, "");
            markAllReadBtn.disabled = unreadCount === 0;
            bindNotificationActions();
        }

        //按钮绑定
        function bindNotificationActions() {
            //已读按钮绑定
            document.querySelectorAll(".mark-read-btn").forEach(btn => {
                btn.addEventListener("click", event => {
                    event.stopPropagation();
                    const id = btn.getAttribute("data-id");
                    const item = notifications.find(notification => notification.id === id);
                    if (!item) return;
                    item.read = true;
                    saveRead(id);
                    renderNotifications();
                });
            });

            //详情按钮绑定
            document.querySelectorAll(".detail-btn").forEach(btn => {
                btn.addEventListener("click", event => {
                    event.stopPropagation();//我点的是按钮，只执行按钮自己的事，不要顺便触发外层通知卡片的点击事件。
                    const requestId = btn.getAttribute("data-request-id");
                    if (requestId) {
                        window.location.href = `request-detail.html?requestId=${encodeURIComponent(requestId)}`;
                    }
                });
            });

            //整条通知点击也标记已读
            document.querySelectorAll(".notification-item").forEach(itemEl => {
                itemEl.addEventListener("click", () => {
                    const id = itemEl.getAttribute("data-id");
                    const item = notifications.find(notification => notification.id === id);
                    if (!item || item.read) return;
                    item.read = true;
                    saveRead(id);
                    renderNotifications();
                });
            });
        }

        async function loadNotifications() {
            if (!notificationList) return;
            setStatus("正在加载通知...", "");
            try {
                const requests = await ApiClient.teacher.listNotifications();
                notifications = buildNotifications(Array.isArray(requests) ? requests : []);
                renderNotifications();
            } catch (error) {
                console.error(error);
                notificationList.innerHTML = `
                    <div class="notification-item">
                        <div class="notification-icon"><i class="bi bi-exclamation-circle"></i></div>
                        <div class="msg-body">
                            <div class="notification-title" style="color:#c74545;">通知加载失败</div>
                            <div class="notification-message">${esc(error.message || "请稍后重试")}</div>
                        </div>
                    </div>
                `;
                setStatus(error.message || "通知加载失败。", "error");
            }
        }

        markAllReadBtn.addEventListener("click", () => {
            notifications.forEach(item => {
                item.read = true;
                saveRead(item.id);
            });
            renderNotifications();
        });

        loadNotifications();

        //debug: sidebar
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
