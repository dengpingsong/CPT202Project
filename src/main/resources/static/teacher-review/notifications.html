<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - 消息/通知</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
<div class="layout" id="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="toggle-wrap">
            <button class="toggle" id="toggleSidebar" aria-label="切换菜单">
                <span></span>
            </button>
        </div>
        <div class="nav-group">
            <a href="projects.html" class="">
                <i class="bi bi-kanban nav-icon"></i>
                <span class="nav-label">我的项目</span>
            </a>
            <a href="index.html" class="">
                <i class="bi bi-file-earmark-check nav-icon"></i>
                <span class="nav-label">审批申请</span>
            </a>
            <a href="history.html" class="">
                <i class="bi bi-clock-history nav-icon"></i>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="notifications.html" class="active">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">消息/通知</span>
            </a>
            <a href="settings.html" class="">
                <i class="bi bi-person-gear nav-icon"></i>
                <span class="nav-label">个人设置</span>
            </a>
        </div>
    </aside>

    
        
    <div class="main-content">
        <h2 class="page-title">消息与系统通知</h2>
        
        <div class="custom-card">
            <div class="ic-wrap"><i class="bi bi-envelope-paper"></i></div>
            <div class="msg-body">
                <h6>新的项目申请提醒</h6>
                <p>学生 <strong>Alice Wang</strong> 刚刚提交了您的项目 "An online project selection system" 的申请。</p>
            </div>
            <div class="msg-time">10 分钟前</div>
        </div>

        <div class="custom-card">
            <div class="ic-wrap" style="background: #fff4e5; color: #e6a23c;"><i class="bi bi-exclamation-triangle"></i></div>
            <div class="msg-body">
                <h6>申请撤回通知</h6>
                <p>学生 <strong>Bob Chen</strong> 撤回了对 "AI Chatbot for Education" 项目的申请。</p>
            </div>
            <div class="msg-time">2 小时前</div>
        </div>

    </div>
    <script src="script.js"></script>
</div>

<script>
    (function() {
        "use strict";
        const layout = document.getElementById("layout");
        const toggle = document.getElementById("toggleSidebar");
        if(layout && toggle) {
            let isCollapsed = false;
            toggle.addEventListener("click", () => {
                isCollapsed = !isCollapsed;
                layout.classList.toggle("collapsed", isCollapsed);
            });
        }
    })();
</script>
</body>
</html>
