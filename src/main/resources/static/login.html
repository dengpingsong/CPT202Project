<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
<div class="login-card">
    <h2>Welcome Back!</h2>
    <h3>Please log in to your account</h3>

    <form id="loginForm">
        <input id="username" type="text" name="username" placeholder="Username" required>
        <input id="password" type="password" name="password" placeholder="Password" required>

        <div class="forgot-wrap">
            <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <div id="generalError" class="helper"></div>
        <button id="loginBtn" type="submit">Login</button>
    </form>

    <div class="links">
        <a href="register.html" class="register-link">Register</a>
    </div>
</div>

<script>
    const BASE_URL = "/api/common/auth";
    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const generalError = document.getElementById("generalError");

    function redirectByRole(role) {
        // 根据后端返回的 role 跳到不同页面
        if (role === "TEACHER") {
            window.location.href = "teacher-review/index.html";
            return;
        }
        if (role === "STUDENT") {
            window.location.href = "student-apply/student-dashboard.html";
            return;
        }
        // 预留管理员
        if (role === "ADMIN") {
            window.location.href = "admin-dashboard.html";
            return;
        }
        generalError.textContent = "Unknown role, cannot redirect.";
    }

    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        generalError.textContent = "";
        loginBtn.disabled = true;

        const payload = {
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value
        };

        try {
            const res = await fetch(`${BASE_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            // 后端 Result.success => code = 1；Result.error => code = 0
            if (data.code === 1 && data.data) {
                const loginData = data.data;

                // 保存登录态
                localStorage.setItem("token", loginData.token || "");
                localStorage.setItem("role", loginData.role || "");
                localStorage.setItem("userId", String(loginData.userId || ""));
                localStorage.setItem("username", loginData.username || "");
                localStorage.setItem("fullName", loginData.fullName || "");
                localStorage.setItem("accountStatus", loginData.accountStatus || "");

                redirectByRole(loginData.role);
            } else {
                generalError.textContent = data.msg || "Login failed";
            }
        } catch (err) {
            console.error(err);
            generalError.textContent = "Network error, please try again.";
        } finally {
            loginBtn.disabled = false;
        }
    });
</script>

</body>
</html>
