<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: url("login/backimg2.png") center center / cover no-repeat;
        }

        .login-card {
            width: 360px;
            padding: 28px 24px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-size: 16px;
            margin: 0 0 10px;
            text-align: left;
        }

        h3 {
            margin: 0 0 18px;
            text-align: left;
            font-weight: 400;
            color: #666;
            font-size: 14px;
        }

        .helper {
            min-height: 16px;
            font-size: 12px;
            margin: -8px 0 10px;
            color: #d93025;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #c9ced6;
            border-radius: 6px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        button,
        .register-link {
            width: 100%;
            padding: 10px;
            border: 1px solid #000;
            border-radius: 6px;
            background-color: #000;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.2;
            text-align: center;
            display: block;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        button:disabled {
            background-color: #999;
            border-color: #999;
            cursor: not-allowed;
        }

        .links {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(30, 79, 191, 0.18);
            text-align: center;
            line-height: 1.9;
        }

        a {
            color: #1e4fbf;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .forgot-wrap {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        .forgot-link {
            font-size: 12px;
            text-decoration: underline;
            color: #000;
        }

        .forgot-link:hover {
            color: #000;
        }

        button:hover,
        .register-link:hover {
            background-color: #222;
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="login-card">
    <h2>Welcome Back!</h2>
    <h3>Please log in to your account</h3>

    <form id="loginForm">
        <input id="username" type="text" name="username" placeholder="Username" required>
        <input id="password" type="password" name="password" placeholder="Password" required>

        <div class="forgot-wrap">
            <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <div id="generalError" class="helper"></div>
        <button id="loginBtn" type="submit">Login</button>
    </form>

    <div class="links">
        <a href="register.html" class="register-link">Register</a>
    </div>
</div>

<script>
    const BASE_URL = "/api/common/auth";
    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const generalError = document.getElementById("generalError");

    function redirectByRole(role) {
        // 根据后端返回的 role 跳到不同页面
        if (role === "TEACHER") {
            window.location.href = "teacher-review/index.html";
            return;
        }
        if (role === "STUDENT") {
            window.location.href = "student-apply/student-dashboard.html";
            return;
        }
        // 预留管理员
        if (role === "ADMIN") {
            window.location.href = "admin-dashboard.html";
            return;
        }
        generalError.textContent = "Unknown role, cannot redirect.";
    }

    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        generalError.textContent = "";
        loginBtn.disabled = true;

        const payload = {
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value
        };

        try {
            const res = await fetch(`${BASE_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            // 后端 Result.success => code = 1；Result.error => code = 0
            if (data.code === 1 && data.data) {
                const loginData = data.data;

                // 保存登录态
                localStorage.setItem("token", loginData.token || "");
                localStorage.setItem("role", loginData.role || "");
                localStorage.setItem("userId", String(loginData.userId || ""));
                localStorage.setItem("username", loginData.username || "");
                localStorage.setItem("fullName", loginData.fullName || "");
                localStorage.setItem("accountStatus", loginData.accountStatus || "");

                redirectByRole(loginData.role);
            } else {
                generalError.textContent = data.msg || "Login failed";
            }
        } catch (err) {
            console.error(err);
            generalError.textContent = "Network error, please try again.";
        } finally {
            loginBtn.disabled = false;
        }
    });
</script>

</body>
</html>
