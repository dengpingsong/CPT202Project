<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员 · 类别管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #f4f3f7;
            --deep: #5a2b98;
            --mid: #7b4fbd;
            --panel: #ffffff;
            --text: #1c1b33;
            --muted: #6b6b82;
            --border: rgba(28,27,51,0.08);
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body { margin:0; font-family: "Segoe UI", Arial, sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; overflow:hidden; }
        .layout { display:grid; grid-template-columns:260px 1fr; min-height:100vh; transition:.3s ease; width:100%; }
        .layout.collapsed { grid-template-columns:80px 1fr; }
        .sidebar { background:linear-gradient(180deg,#3d1566,#631e97); padding:24px 16px; color:white; display:flex; flex-direction:column; gap:20px; position:relative; overflow:hidden; }
        .sidebar::after { content:""; position:absolute; inset:0; background:radial-gradient(circle at top, rgba(255,255,255,0.2), transparent 60%); pointer-events:none; }
        .toggle-wrap { width:48px; height:48px; border-radius:16px; margin-bottom:4px; }
        .toggle { width:100%; height:100%; border-radius:16px; border:none; background:rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
        .toggle span, .toggle span::before, .toggle span::after { display:block; width:22px; height:2px; background:white; transition:all .3s ease; position:absolute; }
        .toggle span { background:transparent; }
        .toggle span::before { content:""; top:0; transform:rotate(45deg); }
        .toggle span::after { content:""; top:0; transform:rotate(-45deg); }
        .layout.collapsed .toggle span { background:white; }
        .layout.collapsed .toggle span::before { top:-8px; transform:none; }
        .layout.collapsed .toggle span::after { top:8px; transform:none; }
        .nav-group { display:flex; flex-direction:column; gap:12px; margin-top:8px; }
        .nav-group a { border:none; background:transparent; color:white; font-size:0.95rem; padding:10px 14px; border-radius:12px; cursor:pointer; display:flex; align-items:center; gap:10px; text-decoration:none; }
        .nav-group a.active, .nav-group a:hover { background:rgba(255,255,255,0.2); }
        .nav-icon { font-size:1.2rem; width:28px; text-align:center; }
        .nav-label { transition:opacity .3s ease; white-space:nowrap; }
        .layout.collapsed .nav-group a { justify-content:center; padding:12px; }
        .layout.collapsed .nav-label { opacity:0; width:0; overflow:hidden; }
        .main-content { flex:1; overflow-y:auto; padding:32px 40px; background:#f8fafc; }
        .dashboard-card { background:white; border-radius:28px; box-shadow:0 12px 30px rgba(0,0,0,0.05); padding:28px 32px; border:1px solid #f0eef2; }
        .card-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:24px; border-bottom:2px solid #f1f5f9; padding-bottom:16px; }
        .card-header h2 { font-size:1.65rem; font-weight:600; background:linear-gradient(135deg,#1e293b,#2d3a4b); background-clip:text; -webkit-background-clip:text; color:transparent; }
        .badge-sub { background:#ede9fe; color:#5b21b6; border-radius:40px; padding:6px 14px; font-size:0.8rem; }
        .data-table { width:100%; border-collapse:collapse; }
        .data-table th, .data-table td { padding:14px 8px; text-align:left; border-bottom:1px solid #edf2f7; }
        .btn-icon { background:none; border:none; cursor:pointer; margin:0 4px; padding:6px 12px; border-radius:30px; font-weight:500; }
        .btn-edit { color:#3b82f6; background:#eff6ff; }
        .btn-delete { color:#dc2626; background:#fef2f2; }
        .add-section { margin-top:30px; background:#fefdf7; border-radius:20px; padding:20px; border:1px dashed #cbd5e1; display:flex; flex-direction:column; gap:12px; }
        .add-input-group { display:flex; gap:14px; align-items:flex-end; }
        .add-input-group input { flex:2; padding:12px 16px; border-radius:30px; border:1px solid #cbd5e1; outline:none; }
        .add-input-group input:focus { border-color:#8b5cf6; box-shadow:0 0 0 3px rgba(139,92,246,0.2); }
        .btn-primary { background:#7c3aed; border:none; padding:10px 24px; border-radius:40px; color:white; font-weight:600; cursor:pointer; }
        .btn-primary:hover { background:#5b21b6; }
        .project-demo-note { background:#f1f5f9; border-radius:20px; padding:14px 20px; font-size:0.8rem; margin-top:18px; color:#475569; }
        .error-message { color:#dc2626; background:#fee2e2; border-radius:20px; padding:12px 16px; margin:10px 0; }
        @media (max-width: 960px) { .data-table { min-width: 600px; } }
    </style>
</head>
<body>
<div class="layout" id="layout">
    <aside class="sidebar">
        <div class="toggle-wrap"><button class="toggle" id="toggleSidebar"><span></span></button></div>
        <div class="nav-group">
            <a href="admin_projects.html"><i class="bi bi-kanban nav-icon"></i><span class="nav-label">项目列表</span></a>
            <a href="admin_categories.html" class="active"><i class="bi bi-tags nav-icon"></i><span class="nav-label">Category 列表</span></a>
            <a href="admin_tags.html"><i class="bi bi-bookmark nav-icon"></i><span class="nav-label">Tag 列表</span></a>
            <a href="admin_settings.html"><i class="bi bi-person-gear nav-icon"></i><span class="nav-label">个人设置</span></a>
        </div>
    </aside>
    <main class="main-content">
        <div class="dashboard-card">
            <div class="card-header">
                <h2>类别管理</h2>
                <div class="badge-sub">唯一名称 · 删除前检查占用</div>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>类别名称</th>
                            <th>项目介绍</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody"><tr><td colspan="4">加载中...</td></tr></tbody>
                </table>
            </div>
            <div class="add-section">
                <div class="add-input-group">
                    <input type="text" id="newCatName" placeholder="类别名称 *" autocomplete="off">
                    <input type="text" id="newCatDesc" placeholder="项目介绍（可选）" autocomplete="off">
                </div>
                <div style="display:flex; gap:12px; align-items:center;">
                    <button class="btn-primary" id="saveCategoryBtn">添加类别</button>
                    <button class="btn-primary" id="cancelEditBtn" type="button" style="display:none; background:#64748b;">取消编辑</button>
                    <span id="categoryFormStatus" style="font-size:0.9rem; color:#475569;"></span>
                </div>
            </div>
            <div class="project-demo-note">修改类别时可同时修改名称和介绍。<br>删除仅当没有任何项目使用此类别时才可删除（后端校验）。</div>
        </div>
    </main>
</div>

<script src="../js/ui-feedback.js"></script>
<script>
    const BASE_URL = '';      // 后端地址，根据实际情况修改
    const TOKEN_KEY = 'token';
    const LOGIN_PAGE = '/login/login.html';

    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) {
        UiFeedback.alert('请先登录').then(() => {
            window.location.href = LOGIN_PAGE;
        });
    }

    async function api(method, url, body = null) {
        const fullUrl = url.startsWith('http') ? url : BASE_URL + url;
        const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(fullUrl, options);
        if (response.status === 401) {
            localStorage.removeItem(TOKEN_KEY);
            UiFeedback.alert('登录已过期，请重新登录').then(() => {
                window.location.href = LOGIN_PAGE;
            });
            throw new Error('Unauthorized');
        }
        const json = await response.json();
        if (json.code !== 1) throw new Error(json.msg || '操作失败');
        return json.data;
    }

    async function loadCategories() { return api('GET', '/api/admin/categories'); }
    async function createCategory(name, description) { return api('POST', '/api/admin/categories', { categoryName: name, description: description || '' }); }
    async function updateCategory(id, name, description) { return api('PUT', `/api/admin/categories/${id}`, { categoryName: name, description: description || '' }); }
    async function deleteCategory(id) { return api('DELETE', `/api/admin/categories/${id}`); }
    const nameInput = document.getElementById('newCatName');
    const descInput = document.getElementById('newCatDesc');
    const saveBtn = document.getElementById('saveCategoryBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const formStatus = document.getElementById('categoryFormStatus');
    let editingCategoryId = null;

    function setFormStatus(message, isError = false) {
        if (!formStatus) return;
        formStatus.textContent = message || '';
        formStatus.style.color = isError ? '#dc2626' : '#475569';
    }

    function resetForm() {
        editingCategoryId = null;
        nameInput.value = '';
        descInput.value = '';
        saveBtn.textContent = '添加类别';
        cancelEditBtn.style.display = 'none';
        setFormStatus('');
    }

    function startEdit(category) {
        editingCategoryId = category.categoryId;
        nameInput.value = category.categoryName || '';
        descInput.value = category.description || '';
        saveBtn.textContent = '保存修改';
        cancelEditBtn.style.display = 'inline-flex';
        setFormStatus(`正在编辑 ID ${category.categoryId} 的类别`);
        nameInput.focus();
    }

    async function render() {
        const tbody = document.getElementById('categoryTableBody');
        if (!tbody) return;
        tbody.innerHTML = '<tr><td colspan="4">加载中...</td></td>';
        try {
            const categories = await loadCategories();
            if (!categories.length) {
                tbody.innerHTML = '<tr><td colspan="4">暂无类别数据</td></tr>';
                return;
            }
            let html = '';
            for (const cat of categories) {
                const desc = cat.description || '—';
                html += `<tr>
                            <td>${escapeHtml(cat.categoryId)}</td>
                            <td><strong>${escapeHtml(cat.categoryName)}</strong></td>
                            <td>${escapeHtml(desc)}</td>
                            <td>
                                <button class="btn-icon btn-edit" data-id="${cat.categoryId}" data-name="${escapeHtml(cat.categoryName)}" data-desc="${escapeHtml(cat.description || '')}">编辑</button>
                                <button class="btn-icon btn-delete" data-id="${cat.categoryId}">删除</button>
                            </td>
                          </tr>`;
            }
            tbody.innerHTML = html;

            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.addEventListener('click', () => {
                    startEdit({
                        categoryId: btn.getAttribute('data-id'),
                        categoryName: btn.getAttribute('data-name'),
                        description: btn.getAttribute('data-desc')
                    });
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const confirmed = await UiFeedback.confirm('确认删除该类别？如果该类别被任何项目使用，删除将失败。', '删除类别');
                    if (!confirmed) return;
                    const id = btn.getAttribute('data-id');
                    try {
                        await deleteCategory(id);
                        setFormStatus('类别已删除');
                        UiFeedback.success('类别已删除');
                        if (String(editingCategoryId) === String(id)) {
                            resetForm();
                        }
                        render();
                    } catch (e) {
                        setFormStatus(`删除失败：${e.message}`, true);
                    }
                });
            });
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4"><div class="error-message">加载失败：${escapeHtml(err.message)}</div></td></tr>`;
        }
    }

    saveBtn?.addEventListener('click', async () => {
        const name = nameInput.value.trim();
        const desc = descInput.value.trim();
        if (!name) {
            setFormStatus('请输入类别名称', true);
            nameInput.focus();
            return;
        }
        try {
            const isEditing = Boolean(editingCategoryId);
            if (editingCategoryId) {
                await updateCategory(editingCategoryId, name, desc);
            } else {
                await createCategory(name, desc);
            }
            resetForm();
            setFormStatus(isEditing ? '类别修改已保存' : '类别添加成功');
            render();
        } catch (e) {
            setFormStatus(`保存失败：${e.message}`, true);
        }
    });

    cancelEditBtn?.addEventListener('click', resetForm);

    function escapeHtml(str) {
        if (str === undefined || str === null) return '';
        return String(str).replace(/[&<>]/g, m => (m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')));
    }

    render();

    const layout = document.getElementById('layout');
    const toggle = document.getElementById('toggleSidebar');
    let collapsed = false;
    toggle.addEventListener('click', () => {
        collapsed = !collapsed;
        layout.classList.toggle('collapsed', collapsed);
    });
</script>
</body>
</html>
