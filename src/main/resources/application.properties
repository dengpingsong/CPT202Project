# Application
spring.application.name=cpt202-program
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# H2 in-memory database (development / CI)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:cpt202db;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.defer-datasource-initialization=true

# H2 console (disable in production)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# Knife4j
knife4j.enable=true
knife4j.setting.language=en
spring.jackson.deserialization.accept-empty-string-as-null-object=true
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.secret=${JWT_SECRET:change-this-secret-to-a-strong-key-with-at-least-32-bytes}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:7200}
jwt.token-name=${JWT_TOKEN_NAME:Authorization}
jwt.token-prefix=${JWT_TOKEN_PREFIX:Bearer }

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.database=${SPRING_DATA_REDIS_DATABASE:0}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.timeout=10s
spring.data.redis.connect-timeout=5s
spring.data.redis.repositories.enabled=false

# Password reset email
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.password-reset-token-expiration-minutes=${APP_PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}
app.email-login-otp-expiration-minutes=${APP_EMAIL_LOGIN_OTP_EXPIRATION_MINUTES:5}
app.email-login-otp-cooldown-seconds=${APP_EMAIL_LOGIN_OTP_COOLDOWN_SECONDS:60}
app.totp-issuer=${APP_TOTP_ISSUER:}
app.two-factor-setup-expiration-minutes=${APP_TWO_FACTOR_SETUP_EXPIRATION_MINUTES:10}
app.two-factor-login-challenge-expiration-minutes=${APP_TWO_FACTOR_LOGIN_CHALLENGE_EXPIRATION_MINUTES:5}

# Mail
spring.mail.host=${SPRING_MAIL_HOST:smtp.qq.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL_ENABLE:true}
