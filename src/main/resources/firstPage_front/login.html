<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: url("backimg2.png") center center / cover no-repeat;
        }

        .login-card {
            width: 340px;
            padding: 28px 24px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.88);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 10px;
            text-align: left;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 18px;
            text-align: left;
            font-weight: 400;
            color: #666;
            font-size: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #c9ced6;
            border-radius: 6px;
            margin-bottom: 14px;
        }

        button,
        .register-link {
            width: 100%;
            padding: 10px;
            border: 1px solid #000;
            border-radius: 6px;
            background-color: #000;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.2;
            text-align: center;
            display: block;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .links {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(30, 79, 191, 0.18);
            text-align: center;
            line-height: 1.9;
        }

        a {
            color: #1e4fbf;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .forgot-wrap {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        .forgot-link {
            font-size: 12px;
            text-decoration: underline;
            color: #000;
        }

        .forgot-link:hover {
            color: #000;
        }

        button:hover,
        .register-link:hover {
            background-color: #222;
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="login-card">
    <h2>Welcome Back!</h2>
    <h3>Please log in to your account</h3>

    <form>
        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">
        <div class="forgot-wrap">
            <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a href="register.html" class="register-link">Register</a>
    </div>
</div>

</body>
</html>
