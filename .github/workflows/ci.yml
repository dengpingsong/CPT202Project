name: CI - Build & Test

on:
  push:
    branches: [ "main", "master", "develop", "frontend" ]
  pull_request:
    branches: [ "main", "master", "develop", "frontend" ]

jobs:
  backend-tests:
    name: Backend Tests (Java 17)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn --batch-mode --no-transfer-progress compile

      - name: Run backend tests
        run: mvn --batch-mode --no-transfer-progress test -P backend

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-backend
          path: target/surefire-reports/
          retention-days: 7

  frontend-tests:
    name: Frontend Tests (HtmlUnit, headless)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run frontend tests
        run: mvn --batch-mode --no-transfer-progress test -P frontend

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-frontend
          path: target/surefire-reports/
          retention-days: 7

  scenario-tests:
    name: Scenario Tests (multi-role workflow)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run scenario tests
        run: mvn --batch-mode --no-transfer-progress test -P scenario

      - name: Upload scenario test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-scenario
          path: target/surefire-reports/
          retention-days: 7

  package:
    name: Package JAR
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-tests, scenario-tests ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package with Maven
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

      - name: Upload packaged JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 30

