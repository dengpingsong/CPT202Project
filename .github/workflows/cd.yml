name: CD (Main) - Docker Deploy

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    types:
      - completed
    branches: ["main", "master"]

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package application JAR
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cpt202program:${{ github.event.workflow_run.head_sha }}

      - name: Save Docker image archive
        run: docker save cpt202program:${{ github.event.workflow_run.head_sha }} | gzip > cpt202program-image.tar.gz

      - name: Pull MySQL image on runner
        run: docker pull mysql:8.4

      - name: Save MySQL image archive
        run: docker save mysql:8.4 | gzip > mysql-image.tar.gz

      - name: Show Docker archive files
        run: ls -lh cpt202program-image.tar.gz mysql-image.tar.gz

      - name: Bundle Docker archives and deployment files
        run: tar -czf docker-images-bundle.tar.gz cpt202program-image.tar.gz mysql-image.tar.gz docker-compose.yml docker-compose.dev.yml nginx

      - name: Upload Docker bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          source: docker-images-bundle.tar.gz
          target: /tmp/

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Validate deployment secrets
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          test -n "$ALIYUN_HOST" || { echo "::error::Missing secret ALIYUN_HOST"; exit 1; }
          test -n "$ALIYUN_USERNAME" || { echo "::error::Missing secret ALIYUN_USERNAME"; exit 1; }
          test -n "$ALIYUN_SSH_KEY" || { echo "::error::Missing secret ALIYUN_SSH_KEY"; exit 1; }
          test -n "$MYSQL_ROOT_PASSWORD" || { echo "::error::Missing secret MYSQL_ROOT_PASSWORD"; exit 1; }
          test -n "$MYSQL_DATABASE" || { echo "::error::Missing secret MYSQL_DATABASE"; exit 1; }
          test -n "$MYSQL_USERNAME" || { echo "::error::Missing secret MYSQL_USERNAME"; exit 1; }
          test -n "$MYSQL_PASSWORD" || { echo "::error::Missing secret MYSQL_PASSWORD"; exit 1; }
          test -n "$JWT_SECRET" || echo "::warning::JWT_SECRET not set; falling back to application default (not recommended for production)"

      - name: Deploy application and MySQL on Aliyun Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          script: |
            set -eux
            mkdir -p /opt/cpt202
            docker network create cpt202-network || true
            docker volume create cpt202-mysql-data || true
            NGINX_CONFIG_CHANGED=0
            NGINX_CERT_CHANGED=0

            ls -lh /tmp/docker-images-bundle.tar.gz
            tar -xzf /tmp/docker-images-bundle.tar.gz -C /tmp/
            rm -f /tmp/docker-images-bundle.tar.gz

            mkdir -p /opt/cpt202/nginx /opt/cpt202/nginx/certs
            cp /tmp/docker-compose.yml /opt/cpt202/docker-compose.yml
            if [ ! -f /opt/cpt202/nginx/nginx.conf ] || ! cmp -s /tmp/nginx/nginx.conf /opt/cpt202/nginx/nginx.conf; then
              cp /tmp/nginx/nginx.conf /opt/cpt202/nginx/nginx.conf
              NGINX_CONFIG_CHANGED=1
            fi
            rm -f /tmp/docker-compose.yml /tmp/docker-compose.dev.yml
            rm -rf /tmp/nginx

            if [ ! -f /opt/cpt202/nginx/certs/selfsigned.crt ] || [ ! -f /opt/cpt202/nginx/certs/selfsigned.key ]; then
              SERVER_HOST='${{ secrets.ALIYUN_HOST }}'
              SAN_PREFIX="DNS"
              if echo "$SERVER_HOST" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
                SAN_PREFIX="IP"
              fi
              openssl req -x509 -nodes -newkey rsa:2048 \
                -keyout /opt/cpt202/nginx/certs/selfsigned.key \
                -out /opt/cpt202/nginx/certs/selfsigned.crt \
                -days 3650 \
                -subj "/CN=$SERVER_HOST" \
                -addext "subjectAltName=${SAN_PREFIX}:$SERVER_HOST"
              NGINX_CERT_CHANGED=1
            fi

            gzip -dc /tmp/mysql-image.tar.gz | docker load
            rm -f /tmp/mysql-image.tar.gz

            gzip -dc /tmp/cpt202program-image.tar.gz | docker load
            rm -f /tmp/cpt202program-image.tar.gz

            cat > /opt/cpt202/.env <<EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            APP_IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
            EOF
            JWT_SECRET_VAL='${{ secrets.JWT_SECRET }}'
            [ -n "$JWT_SECRET_VAL" ] && echo "JWT_SECRET=$JWT_SECRET_VAL" >> /opt/cpt202/.env || true
            chmod 600 /opt/cpt202/.env

            cd /opt/cpt202
            docker compose up -d --remove-orphans

            until curl -fsS http://127.0.0.1/doc.html >/dev/null; do
              sleep 5
            done
            until curl -kfsS https://127.0.0.1/doc.html >/dev/null; do
              sleep 5
            done

            if [ "$NGINX_CONFIG_CHANGED" -eq 1 ] || [ "$NGINX_CERT_CHANGED" -eq 1 ]; then
              docker exec cpt202-nginx nginx -s reload
            fi

            rm -f /opt/cpt202/.env
            docker compose ps
