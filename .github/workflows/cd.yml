name: Docker CD

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches: ["dev"]

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package application JAR
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cpt202program:${{ github.event.workflow_run.head_sha }}

      - name: Save Docker image archive
        run: docker save cpt202program:${{ github.event.workflow_run.head_sha }} | gzip > cpt202program-image.tar.gz

      - name: Pull MySQL image on runner
        run: docker pull mysql:8.4

      - name: Save MySQL image archive
        run: docker save mysql:8.4 | gzip > mysql-image.tar.gz

      - name: Show Docker archive files
        run: ls -lh cpt202program-image.tar.gz mysql-image.tar.gz

      - name: Bundle Docker archives
        run: tar -czf docker-images-bundle.tar.gz cpt202program-image.tar.gz mysql-image.tar.gz

      - name: Upload Docker bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          source: docker-images-bundle.tar.gz
          target: /tmp/

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Validate deployment secrets
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          test -n "$ALIYUN_HOST" || { echo "::error::Missing secret ALIYUN_HOST"; exit 1; }
          test -n "$ALIYUN_USERNAME" || { echo "::error::Missing secret ALIYUN_USERNAME"; exit 1; }
          test -n "$ALIYUN_SSH_KEY" || { echo "::error::Missing secret ALIYUN_SSH_KEY"; exit 1; }
          test -n "$MYSQL_ROOT_PASSWORD" || { echo "::error::Missing secret MYSQL_ROOT_PASSWORD"; exit 1; }
          test -n "$MYSQL_DATABASE" || { echo "::error::Missing secret MYSQL_DATABASE"; exit 1; }
          test -n "$MYSQL_USERNAME" || { echo "::error::Missing secret MYSQL_USERNAME"; exit 1; }
          test -n "$MYSQL_PASSWORD" || { echo "::error::Missing secret MYSQL_PASSWORD"; exit 1; }

      - name: Deploy application and MySQL on Aliyun Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          script: |
            set -eux
            docker network create cpt202-network || true
            docker volume create cpt202-mysql-data || true

            ls -lh /tmp/docker-images-bundle.tar.gz
            tar -xzf /tmp/docker-images-bundle.tar.gz -C /tmp/
            rm -f /tmp/docker-images-bundle.tar.gz
            ls -lh /tmp/cpt202program-image.tar.gz /tmp/mysql-image.tar.gz

            gzip -dc /tmp/mysql-image.tar.gz | docker load
            rm -f /tmp/mysql-image.tar.gz

            cat > /tmp/cpt202-mysql.env <<EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            EOF

            if ! docker ps -a --format '{{.Names}}' | grep -qx cpt202-mysql; then
              docker run -d \
                --name cpt202-mysql \
                --restart unless-stopped \
                --network cpt202-network \
                -v cpt202-mysql-data:/var/lib/mysql \
                --env-file /tmp/cpt202-mysql.env \
                mysql:8.4
            else
              docker start cpt202-mysql || true
            fi

            until docker exec -e MYSQL_PWD="${{ secrets.MYSQL_ROOT_PASSWORD }}" cpt202-mysql mysqladmin ping -h 127.0.0.1 -u root --silent; do
              sleep 5
            done

            gzip -dc /tmp/cpt202program-image.tar.gz | docker load
            rm -f /tmp/cpt202program-image.tar.gz

            cat > /tmp/cpt202program.env <<EOF
            SPRING_DATASOURCE_URL=jdbc:mysql://cpt202-mysql:3306/${{ secrets.MYSQL_DATABASE }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
            SPRING_DATASOURCE_USERNAME=${{ secrets.MYSQL_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
            SPRING_JPA_HIBERNATE_DDL_AUTO=update
            SPRING_H2_CONSOLE_ENABLED=false
            EOF

            docker images | grep -E 'cpt202program|mysql' || true

            docker stop cpt202program || true
            docker rm cpt202program || true
            docker run -d \
              --name cpt202program \
              --restart unless-stopped \
              --network cpt202-network \
              -p 127.0.0.1:9001:3306 \
              --env-file /tmp/cpt202program.env \
              cpt202program:${{ github.event.workflow_run.head_sha }}

            rm -f /tmp/cpt202-mysql.env /tmp/cpt202program.env

            docker ps -a --filter name=cpt202-mysql --filter name=cpt202program