#CD workflow:
#Different from cd.yml, devcd.yml will only be triggered when files are pushed to develop branch.
#The database built by devcd, which is cpt202-mysql, will open the port 9001 to host machine.

name: Docker CD

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches: ["develop"]

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package application JAR
        run: mvn --batch-mode --no-transfer-progress -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: cpt202program:${{ github.event.workflow_run.head_sha }}

      - name: Save Docker image archive
        run: docker save cpt202program:${{ github.event.workflow_run.head_sha }} | gzip > cpt202program-image.tar.gz

      - name: Show Docker archive file
        run: ls -lh cpt202program-image.tar.gz

      - name: Upload app image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          source: cpt202program-image.tar.gz
          target: /tmp/
          timeout: 120s
          command_timeout: 20m
          debug: true

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Validate deployment secrets
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          test -n "$ALIYUN_HOST" || { echo "::error::Missing secret ALIYUN_HOST"; exit 1; }
          test -n "$ALIYUN_USERNAME" || { echo "::error::Missing secret ALIYUN_USERNAME"; exit 1; }
          test -n "$ALIYUN_SSH_KEY" || { echo "::error::Missing secret ALIYUN_SSH_KEY"; exit 1; }
          test -n "$MYSQL_ROOT_PASSWORD" || { echo "::error::Missing secret MYSQL_ROOT_PASSWORD"; exit 1; }
          test -n "$MYSQL_DATABASE" || { echo "::error::Missing secret MYSQL_DATABASE"; exit 1; }
          test -n "$MYSQL_USERNAME" || { echo "::error::Missing secret MYSQL_USERNAME"; exit 1; }
          test -n "$MYSQL_PASSWORD" || { echo "::error::Missing secret MYSQL_PASSWORD"; exit 1; }

      - name: Deploy application and MySQL on Aliyun Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          script: |
            set -eux
            docker network create cpt202-network || true
            docker volume create cpt202-mysql-data || true

            ls -lh /tmp/cpt202program-image.tar.gz

            docker image inspect mysql:8.4 >/dev/null 2>&1 || docker pull mysql:8.4

            cat > /tmp/cpt202-mysql.env <<EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            EOF

            if ! docker ps -a --format '{{.Names}}' | grep -qx cpt202-mysql; then
              docker run -d \
                --name cpt202-mysql \
                --restart unless-stopped \
                --network cpt202-network \
                -p 9001:3306 \
                -v cpt202-mysql-data:/var/lib/mysql \
                --env-file /tmp/cpt202-mysql.env \
                mysql:8.4
            else
              docker start cpt202-mysql || true
            fi

            until docker exec -e MYSQL_PWD="${{ secrets.MYSQL_ROOT_PASSWORD }}" cpt202-mysql mysqladmin ping -h 127.0.0.1 -u root --silent; do
            sleep 5
            done
  
            APP_DB='${{ secrets.MYSQL_DATABASE }}'
            APP_USER='${{ secrets.MYSQL_USERNAME }}'
            APP_PASS='${{ secrets.MYSQL_PASSWORD }}'
  
            ESCAPED_APP_DB=$(printf "%s" "$APP_DB" | sed 's/`/``/g')
            ESCAPED_APP_USER=$(printf "%s" "$APP_USER" | sed "s/'/''/g")
            ESCAPED_APP_PASS=$(printf "%s" "$APP_PASS" | sed "s/'/''/g")
  
            docker exec -e MYSQL_PWD="${{ secrets.MYSQL_ROOT_PASSWORD }}" cpt202-mysql \
            mysql -uroot <<SQL
            CREATE DATABASE IF NOT EXISTS \`$ESCAPED_APP_DB\`
            CHARACTER SET utf8mb4
            COLLATE utf8mb4_unicode_ci;
  
            CREATE USER IF NOT EXISTS '$ESCAPED_APP_USER'@'%' IDENTIFIED BY '$ESCAPED_APP_PASS';
  
            ALTER USER '$ESCAPED_APP_USER'@'%' IDENTIFIED BY '$ESCAPED_APP_PASS';
  
            GRANT ALL PRIVILEGES ON \`$ESCAPED_APP_DB\`.* TO '$ESCAPED_APP_USER'@'%';
  
            FLUSH PRIVILEGES;
            SQL
  
            gzip -dc /tmp/cpt202program-image.tar.gz | docker load
            rm -f /tmp/cpt202program-image.tar.gz

            cat > /tmp/cpt202program.env <<EOF
            SPRING_DATASOURCE_URL=jdbc:mysql://cpt202-mysql:3306/${{ secrets.MYSQL_DATABASE }}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
            SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
            SPRING_DATASOURCE_USERNAME=${{ secrets.MYSQL_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
            SPRING_JPA_HIBERNATE_DDL_AUTO=update
            SPRING_H2_CONSOLE_ENABLED=false
            EOF

            docker images | grep -E 'cpt202program|mysql' || true

            docker stop cpt202program || true
            docker rm cpt202program || true
            docker run -d \
              --name cpt202program \
              --restart unless-stopped \
              --network cpt202-network \
              -p 8080:8080 \
              --env-file /tmp/cpt202program.env \
              cpt202program:${{ github.event.workflow_run.head_sha }}

            rm -f /tmp/cpt202-mysql.env /tmp/cpt202program.env

            docker ps -a --filter name=cpt202-mysql --filter name=cpt202program